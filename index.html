<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Life OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap');

.lifeos-root {
  --bg-void:#0A0D12;
  --bg-panel:#12161D;
  --bg-raised:#1A1F28;
  --accent:#4FD1C5;
  --accent-dim: rgba(79,209,197,0.14);
  --warn:#E8A33D;
  --warn-dim: rgba(232,163,61,0.14);
  --danger:#E8615C;
  --text:#E8ECF1;
  --text-muted:#7B8494;
  --text-dim:#4B5563;
  --border:#212733;
  --radius: 10px;

  font-family: 'Inter', sans-serif;
  background: var(--bg-void);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.lifeos-root * { box-sizing: border-box; }

.lo-body { display: flex; flex: 1; min-height: 0; }

/* ---- Banner ---- */
.lo-banner { position: relative; width: 100%; height: 150px; flex-shrink: 0; background: var(--bg-panel); border-bottom: 1px solid var(--border); overflow: hidden; }
.lo-banner img { width: 100%; height: 100%; object-fit: cover; display: block; }
.lo-banner-empty {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px;
  cursor: pointer;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.5px;
  border: 1px dashed var(--border);
  box-sizing: border-box;
  transition: color .15s, border-color .15s;
}
.lo-banner-empty:hover { color: var(--accent); border-color: var(--accent); }
.lo-banner-controls { position: absolute; top: 10px; right: 10px; display: flex; gap: 6px; }
.lo-banner-position-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(10,13,18,0.85);
  backdrop-filter: blur(4px);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.lo-banner-position-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); white-space: nowrap; }
.lo-banner-position-overlay input[type=range] { flex: 1; accent-color: var(--accent); }
.lo-banner-btn {
  background: rgba(10,13,18,0.75);
  backdrop-filter: blur(4px);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
}
.lo-banner-btn:hover { border-color: var(--accent); color: var(--accent); }
.lo-banner-editor {
  position: absolute; inset: 0;
  background: rgba(10,13,18,0.94);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  padding: 14px;
}
.lo-banner-editor-label { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-muted); letter-spacing: 0.5px; }
.lo-banner-editor-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
.lo-banner-editor-row .lo-input { width: 240px; }

.lifeos-mono { font-family: 'JetBrains Mono', monospace; }

/* ---- Sidebar ---- */
.lo-sidebar {
  width: 210px;
  flex-shrink: 0;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 20px 14px;
}
.lo-logo {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 0.5px;
  color: var(--text);
  margin-bottom: 2px;
  padding: 0 6px;
}
.lo-logo span { color: var(--accent); }
.lo-tagline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  padding: 0 6px;
  margin-bottom: 22px;
  letter-spacing: 0.5px;
}
.lo-nav { display: flex; flex-direction: column; gap: 3px; }
.lo-nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
  transition: background .15s, color .15s;
  user-select: none;
  border: 1px solid transparent;
}
.lo-nav-item:hover { background: var(--bg-raised); color: var(--text); }
.lo-nav-item.active {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: rgba(79,209,197,0.25);
}
.lo-nav-item svg { flex-shrink: 0; opacity: 0.9; }
.lo-nav-spacer { flex: 1; }
.lo-status-mini {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  padding: 10px 6px 2px;
  border-top: 1px solid var(--border);
  margin-top: 10px;
  line-height: 1.6;
}
.lo-status-mini .dot { color: var(--accent); }

/* ---- YouTube Player ---- */
.lo-player { margin: 14px 0; padding-top: 14px; border-top: 1px solid var(--border); }
.lo-player-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.lo-player-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.5px; }
.lo-player-change { background: none; border: none; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 10px; cursor: pointer; padding: 0; }
.lo-player-change:hover { color: var(--accent); }
.lo-player-frame-wrap { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; background: var(--bg-raised); border: 1px solid var(--border); }
.lo-player-frame-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
.lo-player input.lo-input { font-size: 11px; padding: 7px 8px; margin-bottom: 6px; }
.lo-player button.lo-btn { width: 100%; font-size: 11px; padding: 7px; }

/* ---- Custom Time Picker ---- */
.lo-time-picker-wrap { display: contents; }
.lo-time-picker-btn {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 7px;
  padding: 9px 12px;
  font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  flex: 0 0 100px;
  text-align: center;
}
.lo-time-picker-btn:hover { border-color: var(--accent); color: var(--accent); }
.lo-time-picker-panel {
  position: absolute;
  z-index: 9999;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.5);
  padding: 10px;
  width: 160px;
}
.lo-time-picker-cols { display: flex; align-items: stretch; gap: 4px; height: 180px; }
.lo-time-picker-col {
  flex: 1;
  overflow-y: auto;
  scroll-snap-type: y proximity;
  border-radius: 6px;
  background: var(--bg-raised);
}
.lo-time-picker-col::-webkit-scrollbar { width: 5px; }
.lo-time-picker-col::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.lo-time-picker-sep { display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-weight: 700; }
.lo-time-picker-item {
  padding: 8px 0;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  scroll-snap-align: center;
  border-radius: 5px;
}
.lo-time-picker-item:hover { background: var(--bg-panel); color: var(--text); }
.lo-time-picker-item.selected { background: var(--accent); color: #06231F; font-weight: 700; }
.lo-time-picker-actions { display: flex; gap: 6px; margin-top: 10px; }
.lo-time-picker-actions .lo-btn { flex: 1; font-size: 11px; padding: 7px; }

/* ---- Auth ---- */
.lo-auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
.lo-auth-card { width: 300px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; padding: 28px 24px; text-align: center; }
.lo-auth-tabs { display: flex; gap: 6px; margin-bottom: 18px; justify-content: center; }
.lo-auth-error { color: var(--danger); font-size: 11.5px; margin-bottom: 10px; font-family: 'JetBrains Mono', monospace; line-height: 1.5; }
.lo-logout-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  margin-top: 4px;
}
.lo-logout-btn:hover { color: var(--danger); }

/* ---- Main ---- */
.lo-main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg-void); }
.lo-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 26px;
  border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
}
.lo-topbar-left { font-size: 12px; color: var(--text-muted); letter-spacing: 0.5px; }
.lo-topbar-right { display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--text-dim); }
.lo-uptime-badge {
  background: var(--accent-dim);
  color: var(--accent);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.lo-content { flex: 1; overflow-y: auto; padding: 26px 30px 40px; }
.lo-content::-webkit-scrollbar { width: 8px; }
.lo-content::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 4px; }

.lo-module-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 4px;
}
.lo-module-sub {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 24px;
}

/* ---- Cards / grid ---- */
.lo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 24px; }
.lo-card {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
}
.lo-card-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.lo-card-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 26px;
  font-weight: 700;
}
.lo-card-value.accent { color: var(--accent); }
.lo-card-value.warn { color: var(--warn); }

.lo-panel {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 18px;
}
.lo-panel-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ---- Process list (habits on dashboard) ---- */
.lo-proc-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.lo-proc-row:last-child { border-bottom: none; }
.lo-proc-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
.lo-proc-dot.on { background: var(--accent); box-shadow: 0 0 8px rgba(79,209,197,0.6); }
.lo-proc-name { flex: 1; color: var(--text); }
.lo-proc-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }

/* ---- Forms ---- */
.lo-input, .lo-select, .lo-textarea {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 7px;
  padding: 9px 12px;
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  outline: none;
  width: 100%;
}
.lo-input:focus, .lo-select:focus, .lo-textarea:focus { border-color: var(--accent); }
.lo-textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
.lo-row-form { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.lo-row-form .lo-input { flex: 2; min-width: 140px; }
.lo-row-form .lo-select { flex: 1; min-width: 110px; }

.lo-btn {
  background: var(--accent);
  color: #06231F;
  border: none;
  padding: 9px 16px;
  border-radius: 7px;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: opacity .15s;
  white-space: nowrap;
}
.lo-btn:hover { opacity: 0.85; }
.lo-btn.ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
}
.lo-btn.ghost:hover { color: var(--text); border-color: var(--text-dim); }
.lo-btn.danger-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 10px;
  font-size: 11px;
}
.lo-btn.danger-ghost:hover { color: var(--danger); border-color: var(--danger); }

/* ---- Habits list ---- */

.lo-habit-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.lo-habit-item:last-child { border-bottom: none; }
.lo-habit-name { flex: 1; min-width: 0; }
.lo-habit-title { font-weight: 600; font-size: 13.5px; }
.lo-habit-area { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); margin-top: 2px; }
.lo-week { display: flex; gap: 5px; }
.lo-day-box {
  width: 26px; height: 26px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-raised);
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all .1s;
  flex-shrink: 0;
}
.lo-day-box.done { background: var(--accent); color: #06231F; border-color: var(--accent); font-weight: 700; }
.lo-day-box.not-scheduled { opacity: 0.32; }
.lo-day-box.not-scheduled.done { opacity: 0.6; }
.lo-day-box:hover { border-color: var(--accent); }
.lo-weekday-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 7px 11px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
  user-select: none;
}
.lo-weekday-chip:has(input:checked) { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.lo-weekday-chip input { accent-color: var(--accent); cursor: pointer; }
.lo-streak-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--warn);
  background: var(--warn-dim);
  padding: 3px 8px;
  border-radius: 5px;
  white-space: nowrap;
}

/* ---- Tasks ---- */
.lo-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
.lo-tab {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 6px 12px;
  border-radius: 6px;
  color: var(--text-muted);
  cursor: pointer;
  border: 1px solid var(--border);
}
.lo-tab.active { background: var(--accent-dim); color: var(--accent); border-color: rgba(79,209,197,0.3); }
.lo-task-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 4px;
  border-bottom: 1px solid var(--border);
}
.lo-task-edit-row {
  padding: 12px 4px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-raised);
  border-radius: 8px;
  margin: 4px 0;
}
.lo-task-check {
  width: 18px; height: 18px;
  border-radius: 5px;
  border: 1.5px solid var(--text-dim);
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.lo-task-check.done { background: var(--accent); border-color: var(--accent); }
.lo-task-text { flex: 1; font-size: 13.5px; min-width: 0; word-break: break-word; }
.lo-task-text.done { color: var(--text-dim); text-decoration: line-through; }
.lo-task-tags { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.lo-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  padding: 3px 7px;
  border-radius: 4px;
  background: var(--bg-raised);
  color: var(--text-muted);
  white-space: nowrap;
}
.lo-tag.prio-Augsta { color: var(--danger); }
.lo-tag.prio-Vidēja { color: var(--warn); }
.lo-tag.prio-Zema { color: var(--text-dim); }

/* ---- Goals ---- */
.lo-goal-item { padding: 14px 0; border-bottom: 1px solid var(--border); }
.lo-goal-item:last-child { border-bottom: none; }
.lo-goal-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-bottom: 8px; }
.lo-goal-text { font-size: 13.5px; font-weight: 600; }
.lo-goal-area-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); }
.lo-progress-track { background: var(--bg-raised); height: 7px; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
.lo-progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .2s; }
.lo-goal-controls { display: flex; align-items: center; gap: 8px; }
.lo-goal-controls input[type=range] { flex: 1; accent-color: var(--accent); }
.lo-goal-pct { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); width: 32px; text-align: right; }

/* ---- Journal ---- */
.lo-journal-entry {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.lo-journal-entry:hover .lo-journal-preview { color: var(--text); }
.lo-journal-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); margin-bottom: 4px; }
.lo-journal-preview { font-size: 12.5px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.lo-empty { color: var(--text-dim); font-size: 13px; padding: 20px 0; text-align: center; }

/* ---- Learning tracks ---- */
.lo-track-card {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 16px 18px;
  margin-bottom: 14px;
}
.lo-track-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.lo-track-name { font-weight: 700; font-size: 14.5px; flex: 1; }
.lo-track-pct { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); }
.lo-topic-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.lo-topic-block { border-bottom: 1px solid var(--border); }
.lo-topic-block:last-of-type { border-bottom: none; }
.lo-topic-notes-btn {
  background: none;
  border: 1px solid transparent;
  border-radius: 6px;
  padding: 4px 6px;
  cursor: pointer;
  opacity: 0.5;
  font-size: 13px;
  flex-shrink: 0;
}
.lo-topic-notes-btn:hover { opacity: 1; border-color: var(--border); }
.lo-topic-notes-btn.has-notes { opacity: 1; }
.lo-topic-notes-editor { padding: 0 0 12px 34px; }
.lo-code-textarea {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.6;
  min-height: 90px;
  white-space: pre;
}
.lo-topic-text { flex: 1; font-size: 13px; }
.lo-topic-text.done { color: var(--text-dim); text-decoration: line-through; }
.lo-topic-add-row { display: flex; gap: 8px; margin-top: 8px; }
.lo-topic-add-row .lo-input { font-size: 12.5px; padding: 7px 10px; }
.lo-track-notes-toggle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--text-dim);
  cursor: pointer;
  margin-top: 10px;
  display: inline-block;
  letter-spacing: 0.5px;
}
.lo-track-notes-toggle:hover { color: var(--accent); }
.lo-track-notes { margin-top: 8px; }
.lo-track-notes textarea { min-height: 70px; font-size: 12.5px; }

/* ---- Calendar ---- */
.lo-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.lo-cal-month-label { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: var(--text); text-transform: capitalize; }
.lo-cal-nav { display: flex; gap: 6px; align-items: center; }
.lo-cal-nav-btn {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--text-muted);
  width: 26px; height: 26px;
  border-radius: 6px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
}
.lo-cal-nav-btn:hover { color: var(--accent); border-color: var(--accent); }
.lo-cal-today-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--text-dim);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  cursor: pointer;

    input = (input||'').trim();
    if(/^[a-zA-Z0-9_-]{11}$/.test(input)) return { type: 'video', id: input };
    try{
      const url = new URL(input);
      const list = url.searchParams.get('list');
      if(url.hostname.includes('youtu.be')){
        const id = url.pathname.slice(1).split('?')[0];
        if(list) return { type: 'playlist', id: list };
        if(id) return { type: 'video', id };
      }
      if(url.hostname.includes('youtube.com')){
        if(url.pathname === '/playlist' && list) return { type: 'playlist', id: list };
        if(url.pathname.startsWith('/embed/')) return { type: 'video', id: url.pathname.split('/embed/')[1] };
        if(url.pathname.startsWith('/shorts/')) return { type: 'video', id: url.pathname.split('/shorts/')[1] };
        const v = url.searchParams.get('v');
        if(v) return { type: 'video', id: v };
        if(list) return { type: 'playlist', id: list };
      }
    }catch(e){ /* not a valid URL */ }
    return null;

  function isHabitScheduled(h, dateStr){
    if(h.startDate && dateStr < h.startDate) return false;
    const rec = h.recurrence || 'daily';
    if(rec === 'daily') return true;
    if(rec === 'weekly'){
      const dow = new Date(dateStr+'T00:00:00').getDay();
      return (h.weekdays||[]).includes(dow);
    }
    if(rec === 'monthly'){
      const dayNum = parseInt(dateStr.slice(8,10),10);
      return dayNum === (h.monthDay || 1);
    }
    return true;
  }

  function recurrenceLabel(h){
    const rec = h.recurrence || 'daily';
    if(rec === 'daily') return 'katru dienu';
    if(rec === 'weekly'){
      const names = (h.weekdays||[]).slice().sort().map(i=>DAY_LABELS[i]);
      return names.length ? 'katru nedēļu (' + names.join(', ') + ')' : 'katru nedēļu';
    }
    if(rec === 'monthly') return 'katru mēnesi, ' + (h.monthDay || 1) + '. dienā';
    return '';
  }

  function currentStreak(habitId){
    const habit = state.habits.habits.find(h=>h.id===habitId);
    if(!habit) return 0;
    let streak = 0;
    let d = new Date();
    let guard = 0;
    while(guard < 3660){
      guard++;
      const ds = fmtDate(d);
      if(habit.startDate && ds < habit.startDate) break;
      if(isHabitScheduled(habit, ds)){
        if(state.habits.logs[ds] && state.habits.logs[ds][habitId]){
          streak++;
          d.setDate(d.getDate()-1);
        } else break;
      } else {
        d.setDate(d.getDate()-1);
      }
    }
    return streak;
  }

  function uptimeDays(){
    const start = new Date(state.meta.startDate+'T00:00:00');
    const now = new Date();
    const diff = Math.floor((now-start)/(1000*60*60*24));
    return diff+1;
  }

  const CAL_DAY_LABELS = ['Pr','Ot','Tr','Ce','Pk','Se','Sv'];
  function buildCalendarCells(year, month){
    const firstOfMonth = new Date(year, month, 1);
    const startOffset = (firstOfMonth.getDay()+6)%7; // Monday-first
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const cells = [];
    for(let i=0;i<startOffset;i++) cells.push(null);
    for(let d=1; d<=daysInMonth; d++){
      cells.push(fmtDate(new Date(year, month, d)));
    }
    return cells;
  }

  // ---------------- FINANCE ----------------
  function monthTotals(year, month){
    const key = `${year}-${String(month+1).padStart(2,'0')}`;
    let income = 0, expense = 0; const byCategory = {};
    state.finance.transactions.forEach(t=>{
      if(t.date.slice(0,7)===key){
        if(t.type==='income') income += t.amount;
        else { expense += t.amount; byCategory[t.category] = (byCategory[t.category]||0) + t.amount; }
      }
    });
    return { income, expense, byCategory };
  }
  function yearTotals(year){
    const income = new Array(12).fill(0), expense = new Array(12).fill(0);
    state.finance.transactions.forEach(t=>{
      const [y,m] = t.date.split('-');
      if(parseInt(y,10)===year){
        const idx = parseInt(m,10)-1;
        if(t.type==='income') income[idx] += t.amount; else expense[idx] += t.amount;
      }
    });
    return { income, expense };
  }
  function monthDailyTotals(year, month){
    const days = new Date(year, month+1, 0).getDate();
    const income = new Array(days).fill(0), expense = new Array(days).fill(0);
    state.finance.transactions.forEach(t=>{
      const d = new Date(t.date+'T00:00:00');
      if(d.getFullYear()===year && d.getMonth()===month){
        const idx = d.getDate()-1;
        if(t.type==='income') income[idx] += t.amount; else expense[idx] += t.amount;
      }
    });
    return { income, expense, days };
  }
  function palette(n){
    const colors = ['#4FD1C5','#E8A33D','#E8615C','#7C9EF5','#C77DFF','#5EEAD4','#F4A261','#94A3B8'];
    const out = []; for(let i=0;i<n;i++) out.push(colors[i%colors.length]); return out;
  }
  function baseBarOptions(){
    return {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { color: '#B8C0CC', font: { family: 'Inter', size: 11 } } } },
      scales: {
        x: { ticks: { color: '#7B8494', font: { size: 10 } }, grid: { color: '#212733' } },
        y: { ticks: { color: '#7B8494', font: { size: 10 } }, grid: { color: '#212733' }, beginAtZero: true }
      }
    };
  }

  function mountFinanceChart(){
    const canvas = root.querySelector('#finance-chart');
    if(!canvas || !window.Chart) return;
    if(financeChartInstance){ financeChartInstance.destroy(); financeChartInstance = null; }
    const ctx = canvas.getContext('2d');
    let config;
    if(state.financeView==='summary'){
      const { income, expense, byCategory } = monthTotals(state.finVizYear, state.finVizMonth);
      const labels = Object.keys(byCategory);
      if(labels.length===0){
        config = { type:'bar', data:{ labels:['Šis mēnesis'], datasets:[
          { label:'Ienākumi', data:[income], backgroundColor:'#4FD1C5' },
          { label:'Izdevumi', data:[expense], backgroundColor:'#E8615C' }
        ]}, options: baseBarOptions() };
      } else {
        config = { type:'doughnut', data:{ labels, datasets:[{ data: Object.values(byCategory), backgroundColor: palette(labels.length), borderWidth: 0 }] },
          options: { responsive:true, maintainAspectRatio:false, cutout:'62%', plugins:{ legend:{ position:'bottom', labels:{ color:'#B8C0CC', font:{family:'Inter', size:11} } } } } };
      }
    } else if(state.financeView==='month'){
      const { income, expense, days } = monthDailyTotals(state.finVizYear, state.finVizMonth);
      const labels = Array.from({length: days}, (_,i)=>String(i+1));
      config = { type:'bar', data:{ labels, datasets:[
        { label:'Ienākumi', data: income, backgroundColor:'#4FD1C5' },
        { label:'Izdevumi', data: expense, backgroundColor:'#E8615C' }
      ]}, options: baseBarOptions() };
    } else if(state.financeView==='year'){
      const { income, expense } = yearTotals(state.finVizYear);
      const labels = ['Jan','Feb','Mar','Apr','Mai','Jūn','Jūl','Aug','Sep','Okt','Nov','Dec'];
      config = { type:'bar', data:{ labels, datasets:[
        { label:'Ienākumi', data: income, backgroundColor:'#4FD1C5' },
        { label:'Izdevumi', data: expense, backgroundColor:'#E8615C' }
      ]}, options: baseBarOptions() };
    } else {
      const { income, expense } = yearTotals(state.finVizYear);
      const balanceSeries = income.map((v,i)=> v - expense[i]);
      const labels = ['Jan','Feb','Mar','Apr','Mai','Jūn','Jūl','Aug','Sep','Okt','Nov','Dec'];
      config = { type:'line', data:{ labels, datasets:[
        { label:'Ienākumi', data: income, borderColor:'#4FD1C5', backgroundColor:'rgba(79,209,197,0.1)', tension:0.35, pointRadius:3, fill:true },
        { label:'Izdevumi', data: expense, borderColor:'#E8615C', backgroundColor:'rgba(232,97,92,0.1)', tension:0.35, pointRadius:3, fill:true },
        { label:'Bilance', data: balanceSeries, borderColor:'#7C9EF5', borderDash:[5,4], tension:0.35, pointRadius:3, fill:false }
      ]}, options: baseBarOptions() };
    }
    financeChartInstance = new Chart(ctx, config);
  }

  function renderBudgetSection(){
    const now = new Date();
    const { byCategory } = monthTotals(now.getFullYear(), now.getMonth());
    const monthLabel = now.toLocaleDateString('lv-LV', { month: 'long', year: 'numeric' });
    const budgets = state.finance.budgets;

    return `
      <div class="lo-panel">
        <div class="lo-panel-title">Budžets — ${monthLabel}</div>
        <div class="lo-row-form">
          <input class="lo-input" id="new-budget-category" list="tx-category-list" placeholder="Kategorija" style="flex:1;min-width:120px;" />
          <input class="lo-input" id="new-budget-limit" type="number" step="1" min="0" placeholder="Limits (€/mēn.)" style="flex:1;min-width:120px;" />
          <button class="lo-btn" id="add-budget-btn">+ Pievienot</button>
        </div>

        ${budgets.length ? (()=>{
          const totalBudgeted = budgets.reduce((s,b)=>s+b.limit,0);
          const totalSpent = budgets.reduce((s,b)=>s+(byCategory[b.category]||0),0);
          const remaining = totalBudgeted - totalSpent;
          return `
            <div class="lo-grid" style="margin-bottom:16px;">
              <div class="lo-card"><div class="lo-card-label">Kopā ieplānots</div><div class="lo-card-value">€${totalBudgeted.toFixed(2)}</div></div>
              <div class="lo-card"><div class="lo-card-label">Kopā iztērēts</div><div class="lo-card-value" style="color:${totalSpent>totalBudgeted?'var(--danger)':'var(--text)'};">€${totalSpent.toFixed(2)}</div></div>
              <div class="lo-card"><div class="lo-card-label">Atlicis</div><div class="lo-card-value" style="color:${remaining<0?'var(--danger)':'var(--accent)'};">€${remaining.toFixed(2)}</div></div>
            </div>
          `;
        })() : ''}

        ${budgets.length ? budgets.map(b=>{
          const spent = byCategory[b.category] || 0;
          const pct = b.limit > 0 ? Math.min(100, Math.round((spent / b.limit) * 100)) : 0;
          const over = spent > b.limit;
          const barColor = over ? 'var(--danger)' : (pct >= 80 ? 'var(--warn)' : 'var(--accent)');
          return `
          <div class="lo-goal-item">
            <div class="lo-goal-top">
              <div class="lo-goal-text">${escapeHtml(b.category)}</div>
              <div class="lo-goal-area-tag" style="color:${over ? 'var(--danger)' : 'var(--text-muted)'};">€${spent.toFixed(2)} / €${b.limit.toFixed(2)}</div>
            </div>
            <div class="lo-progress-track"><div class="lo-progress-fill" style="width:${pct}%;background:${barColor};"></div></div>
            <div class="lo-goal-controls">
              <div style="flex:1;font-family:'JetBrains Mono',monospace;font-size:11px;color:${over ? 'var(--danger)' : 'var(--text-dim)'};">${over ? '⚠ Pārsniegts par €' + (spent - b.limit).toFixed(2) : pct + '% izmantots'}</div>
              <button class="lo-btn danger-ghost" data-del-budget="${b.id}">✕</button>
            </div>
          </div>
          `;
        }).join('') : `<div class="lo-empty">Vēl nav iestatītu budžetu. Pievieno kategoriju un ikmēneša limitu augstāk.</div>`}
      </div>
    `;
  }

  function truncateText(str, len){
    if(!str) return '';
    return str.length > len ? str.slice(0, len).trim() + '…' : str;
  }
  function closeTimePicker(){
    const existing = document.getElementById('lo-active-time-picker');
    if(existing){
      if(existing._outsideHandler) document.removeEventListener('mousedown', existing._outsideHandler);
      existing.remove();
    }
  }

  function openTimePicker(triggerEl, currentValue, onSelect){
    closeTimePicker();
    const rect = triggerEl.getBoundingClientRect();
    const panel = document.createElement('div');
    panel.className = 'lo-time-picker-panel';
    panel.id = 'lo-active-time-picker';

    let [ch, cm] = (currentValue || '').split(':').map(v=>parseInt(v,10));
    if(isNaN(ch)) ch = new Date().getHours();
    if(isNaN(cm)) cm = 0;

    const hoursCol = Array.from({length:24}, (_,i)=>i);
    const minutesCol = Array.from({length:60}, (_,i)=>i);

    panel.innerHTML = `
      <div class="lo-time-picker-cols">
        <div class="lo-time-picker-col" id="lo-tp-hours">
          ${hoursCol.map(h=>`<div class="lo-time-picker-item ${h===ch?'selected':''}" data-h="${h}">${String(h).padStart(2,'0')}</div>`).join('')}
        </div>
        <div class="lo-time-picker-sep">:</div>
        <div class="lo-time-picker-col" id="lo-tp-minutes">
          ${minutesCol.map(m=>`<div class="lo-time-picker-item ${m===cm?'selected':''}" data-m="${m}">${String(m).padStart(2,'0')}</div>`).join('')}
        </div>
      </div>
      <div class="lo-time-picker-actions">
        <button type="button" class="lo-btn ghost" id="lo-tp-clear">Notīrīt</button>
        <button type="button" class="lo-btn" id="lo-tp-done">Gatavs</button>
      </div>
    `;
    document.body.appendChild(panel);

    let top = rect.bottom + window.scrollY + 6;
    let left = rect.left + window.scrollX;
    const panelWidth = panel.offsetWidth;
    if(left + panelWidth > window.innerWidth - 10) left = Math.max(10, window.innerWidth - panelWidth - 10);
    if(top + panel.offsetHeight > window.innerHeight + window.scrollY - 10){
      top = rect.top + window.scrollY - panel.offsetHeight - 6;
    }
    panel.style.top = top + 'px';
    panel.style.left = left + 'px';

    let selH = ch, selM = cm;
    panel.querySelectorAll('#lo-tp-hours .lo-time-picker-item').forEach(el=>{
      el.addEventListener('click', ()=>{
        selH = parseInt(el.getAttribute('data-h'), 10);
        panel.querySelectorAll('#lo-tp-hours .lo-time-picker-item').forEach(x=>x.classList.remove('selected'));
        el.classList.add('selected');
      });
    });
    panel.querySelectorAll('#lo-tp-minutes .lo-time-picker-item').forEach(el=>{
      el.addEventListener('click', ()=>{
        selM = parseInt(el.getAttribute('data-m'), 10);
        panel.querySelectorAll('#lo-tp-minutes .lo-time-picker-item').forEach(x=>x.classList.remove('selected'));
        el.classList.add('selected');
      });
    });

    const selHEl = panel.querySelector(`#lo-tp-hours .lo-time-picker-item[data-h="${selH}"]`);
    if(selHEl) selHEl.scrollIntoView({ block: 'center' });
    const selMEl = panel.querySelector(`#lo-tp-minutes .lo-time-picker-item[data-m="${selM}"]`);
    if(selMEl) selMEl.scrollIntoView({ block: 'center' });

    panel.querySelector('#lo-tp-done').addEventListener('click', ()=>{
      const val = String(selH).padStart(2,'0') + ':' + String(selM).padStart(2,'0');
      onSelect(val);
      closeTimePicker();
    });
    panel.querySelector('#lo-tp-clear').addEventListener('click', ()=>{
      onSelect('');
      closeTimePicker();
    });

    const outsideHandler = (e)=>{
      if(!panel.contains(e.target) && e.target !== triggerEl){
        closeTimePicker();
      }
    };
    panel._outsideHandler = outsideHandler;
    setTimeout(()=>{ document.addEventListener('mousedown', outsideHandler); }, 0);
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function attachEvents(){
    root.querySelectorAll('[data-open-time-picker]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.preventDefault();
        const hiddenInput = btn.nextElementSibling;
        if(!hiddenInput) return;
        openTimePicker(btn, hiddenInput.value, (newVal)=>{
          hiddenInput.value = newVal;
          btn.textContent = newVal ? newVal : '🕐 Laiks';
        });
      });
    });

    const logoutBtn = root.querySelector('#logout-btn');
    if(logoutBtn){
      logoutBtn.addEventListener('click', async ()=>{
        await sb.auth.signOut();
      });
    }

    const bannerEmptyTrigger = root.querySelector('#banner-empty-trigger');
    if(bannerEmptyTrigger){
      bannerEmptyTrigger.addEventListener('click', ()=>{ state.bannerEditing = true; render(); });
    }
    const bannerEditBtn = root.querySelector('#banner-edit-btn');
    if(bannerEditBtn){
      bannerEditBtn.addEventListener('click', ()=>{ state.bannerEditing = true; render(); });
    }
    const bannerPositionBtn = root.querySelector('#banner-position-btn');
    if(bannerPositionBtn){
      bannerPositionBtn.addEventListener('click', ()=>{ state.bannerPositioning = true; render(); });
    }
    const bannerPositionSlider = root.querySelector('#banner-position-slider');
    const bannerImg = root.querySelector('#banner-img');
    if(bannerPositionSlider && bannerImg){
      bannerPositionSlider.addEventListener('input', ()=>{
        bannerImg.style.objectPosition = `center ${bannerPositionSlider.value}%`;
      });
    }
    const bannerPositionDone = root.querySelector('#banner-position-done');
    if(bannerPositionDone){
      bannerPositionDone.addEventListener('click', async ()=>{
        const val = bannerPositionSlider ? parseInt(bannerPositionSlider.value, 10) : state.banner.posY;
        state.banner.posY = val;
        state.bannerPositioning = false;
        await safeSet('banner-data', state.banner);
        render();
      });
    }
    const bannerRemoveBtn = root.querySelector('#banner-remove-btn');
    if(bannerRemoveBtn){
      bannerRemoveBtn.addEventListener('click', async ()=>{
        state.banner = { src: null, posY: 50 };
        await safeSet('banner-data', state.banner);
        render();
      });
    }
    const bannerCancelBtn = root.querySelector('#banner-cancel-btn');
    if(bannerCancelBtn){
      bannerCancelBtn.addEventListener('click', ()=>{ state.bannerEditing = false; render(); });
    }
    const bannerUploadBtn = root.querySelector('#banner-upload-btn');
    const bannerFileInput = root.querySelector('#banner-file-input');
    if(bannerUploadBtn && bannerFileInput){
      bannerUploadBtn.addEventListener('click', ()=> bannerFileInput.click());
      bannerFileInput.addEventListener('change', (e)=>{
        const file = e.target.files[0];
        if(!file) return;
        if(file.size > 4*1024*1024){
          alert('Fails ir pārāk liels (maks. ~4MB). Mēģini ar mazāku failu vai izmanto saiti.');
          return;
        }
        const reader = new FileReader();
        reader.onload = async ()=>{
          state.banner = { src: reader.result, posY: 50 };
          await safeSet('banner-data', state.banner);
          state.bannerEditing = false;
          render();
        };
        reader.readAsDataURL(file);
      });
    }
    const bannerSaveUrlBtn = root.querySelector('#banner-save-url-btn');
    if(bannerSaveUrlBtn){
      bannerSaveUrlBtn.addEventListener('click', async ()=>{
        const urlInput = root.querySelector('#banner-url-input');
        const url = urlInput.value.trim();
        if(!url) return;
        state.banner = { src: url, posY: 50 };
        await safeSet('banner-data', state.banner);
        state.bannerEditing = false;
        render();
      });
    }

    const ytSaveBtn = root.querySelector('#yt-save-btn');
    if(ytSaveBtn){
      ytSaveBtn.addEventListener('click', async ()=>{
        const input = root.querySelector('#yt-url-input');
        const source = extractYouTubeSource(input.value);
        if(!source){ alert('Nevarēju atpazīt YouTube saiti. Pārbaudi un mēģini vēlreiz.'); return; }
        state.youtube = source;
        state.youtubeEditing = false;
        await safeSet('youtube-data', state.youtube);
        render();
      });
    }
    const ytChangeBtn = root.querySelector('#yt-change-btn');
    if(ytChangeBtn){
      ytChangeBtn.addEventListener('click', ()=>{ state.youtubeEditing = true; render(); });
    }

    root.querySelectorAll('[data-nav]').forEach(el=>{
      el.addEventListener('click', ()=>{ state.module = el.getAttribute('data-nav'); render(); });
    });

    // Calendar
    const calPrev = root.querySelector('#cal-prev');
    if(calPrev){
      calPrev.addEventListener('click', ()=>{
        state.calMonth--;
        if(state.calMonth<0){ state.calMonth=11; state.calYear--; }
        render();
      });
    }
    const calNext = root.querySelector('#cal-next');
    if(calNext){
      calNext.addEventListener('click', ()=>{
        state.calMonth++;
        if(state.calMonth>11){ state.calMonth=0; state.calYear++; }
        render();
      });
    }
    const calToday = root.querySelector('#cal-today');
    if(calToday){
      calToday.addEventListener('click', ()=>{
        const now = new Date();
        state.calYear = now.getFullYear();
        state.calMonth = now.getMonth();
        render();
      });
    }
    root.querySelectorAll('[data-cal-day]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const clicked = el.getAttribute('data-cal-day');
        state.calSelectedDate = state.calSelectedDate === clicked ? null : clicked;
        render();
      });
    });
    const calDetailClose = root.querySelector('#cal-detail-close');
    if(calDetailClose){
      calDetailClose.addEventListener('click', ()=>{ state.calSelectedDate = null; render(); });
    }
    const openJournalFromCal = root.querySelector('[data-open-journal-from-cal]');
    if(openJournalFromCal){
      openJournalFromCal.addEventListener('click', ()=>{
        state.journalDate = openJournalFromCal.getAttribute('data-open-journal-from-cal');
        state.module = 'journal';
        render();
      });
    }

    // Habits
    const templatesToggle = root.querySelector('#templates-toggle');
    if(templatesToggle){
      templatesToggle.addEventListener('click', ()=>{ state.showTemplates = !state.showTemplates; render(); });
    }
    root.querySelectorAll('[data-add-template]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const idx = parseInt(el.getAttribute('data-add-template'), 10);
        const t = HABIT_TEMPLATES[idx];
        if(!t) return;
        const nameInput = root.querySelector('#new-habit-name');
        const areaSelect = root.querySelector('#new-habit-area');
        if(nameInput) nameInput.value = t.name;
        if(areaSelect) areaSelect.value = t.area;
        if(nameInput){
          nameInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
          nameInput.focus();
        }
      });
    });
    const recurrenceSelect = root.querySelector('#new-habit-recurrence');
    const weekdaysWrap = root.querySelector('#new-habit-weekdays-wrap');
    const monthdayWrap = root.querySelector('#new-habit-monthday-wrap');
    if(recurrenceSelect){
      recurrenceSelect.addEventListener('change', ()=>{
        if(weekdaysWrap) weekdaysWrap.style.display = recurrenceSelect.value === 'weekly' ? 'flex' : 'none';
        if(monthdayWrap) monthdayWrap.style.display = recurrenceSelect.value === 'monthly' ? 'flex' : 'none';
      });
    }
    const addHabitBtn = root.querySelector('#add-habit-btn');
    if(addHabitBtn){
      addHabitBtn.addEventListener('click', async ()=>{
        const nameInput = root.querySelector('#new-habit-name');
        const areaSelect = root.querySelector('#new-habit-area');
        const startDateInput = root.querySelector('#new-habit-start-date');
        const reminderTimeInput = root.querySelector('#new-habit-reminder-time');
        const recurrenceSel = root.querySelector('#new-habit-recurrence');
        const name = nameInput.value.trim();
        if(!name) return;
        const recurrence = recurrenceSel ? recurrenceSel.value : 'daily';
        const newHabit = {
          id: uid(),
          name,
          area: areaSelect.value,
          startDate: startDateInput.value || todayStr(),
          reminderTime: reminderTimeInput.value || null,
          recurrence,
        };
        if(recurrence === 'weekly'){
          const checked = Array.from(root.querySelectorAll('.new-habit-weekday-cb:checked')).map(cb=>parseInt(cb.value,10));
          newHabit.weekdays = checked.length ? checked : [new Date().getDay()];
        }
        if(recurrence === 'monthly'){
          const monthDayInput = root.querySelector('#new-habit-month-day');
          const md = parseInt(monthDayInput.value, 10);
          newHabit.monthDay = (md >= 1 && md <= 31) ? md : new Date().getDate();
        }
        state.habits.habits.push(newHabit);
        await safeSet('habits-data', state.habits);
        render();
      });
    }
    root.querySelectorAll('[data-habit-day]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const [habitId, date] = el.getAttribute('data-habit-day').split('|');
        if(!state.habits.logs[date]) state.habits.logs[date] = {};
        state.habits.logs[date][habitId] = !state.habits.logs[date][habitId];
        await safeSet('habits-data', state.habits);
        render();
      });
    });
    root.querySelectorAll('[data-del-habit]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const id = el.getAttribute('data-del-habit');
        state.habits.habits = state.habits.habits.filter(h=>h.id!==id);
        await safeSet('habits-data', state.habits);
        render();
      });

    // Tasks

      addTaskBtn.addEventListener('click', async ()=>{
        const textInput = root.querySelector('#new-task-text');
        const projectInput = root.querySelector('#new-task-project');

        if(!text) return;
        state.tasks.tasks.unshift({ id: uid(), text, project: projectInput.value.trim(), dueDate: dueInput.value || null, dueTime: dueTimeInput.value || null, priority: prioSelect.value, done: false });

        render();

      el.addEventListener('click', async ()=>{

          g.progress = parseInt(el.value,10);
          const item = el.closest('.lo-goal-item');
          item.querySelector('.lo-progress-fill').style.width = g.progress+'%';
          item.querySelector('.lo-goal-pct').textContent = g.progress+'%';

      el.addEventListener('change', async ()=>{ await safeSet('goals-data', state.goals); });

      el.addEventListener('click', async ()=>{

        await safeSet('goals-data', state.goals);
        render();
      });
    });

    // Learning
    root.querySelectorAll('[data-load-learning-template]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const key = el.getAttribute('data-load-learning-template');
        const tpl = LEARNING_TRACK_TEMPLATES[key];
        if(!tpl) return;
        let track = state.learning.tracks.find(t=>t.name.toLowerCase()===tpl.name.toLowerCase());
        if(!track){
          track = { id: uid(), name: tpl.name, topics: [], notes: '' };
          state.learning.tracks.push(track);
        }
        const existingTexts = new Set(track.topics.map(t=>t.text));
        let added = 0;
        tpl.topics.forEach(text=>{
          if(!existingTexts.has(text)){
            track.topics.push({ id: uid(), text, done: false });
            added++;
          }
        });
        await safeSet('learning-data', state.learning);
        render();
        if(added === 0){
          alert(`"${tpl.name}" plāns jau ir pilnībā ielādēts.`);
        }
      });

    const addTrackBtn = root.querySelector('#add-track-btn');
    if(addTrackBtn){
      addTrackBtn.addEventListener('click', async ()=>{
        const nameInput = root.querySelector('#new-track-name');
        const name = nameInput.value.trim();

        state.learning.tracks.push({ id: uid(), name, topics: [], notes: '' });

        render();
      });

    root.querySelectorAll('[data-del-track]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const id = el.getAttribute('data-del-track');
        state.learning.tracks = state.learning.tracks.filter(t=>t.id!==id);
        await safeSet('learning-data', state.learning);
        render();
      });
    });
    root.querySelectorAll('[data-add-topic]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const trackId = el.getAttribute('data-add-topic');
        const input = root.querySelector(`[data-topic-input="${trackId}"]`);
        const text = input.value.trim();
        if(!text) return;
        const track = state.learning.tracks.find(t=>t.id===trackId);
        track.topics.push({ id: uid(), text, done: false });
        await safeSet('learning-data', state.learning);
        render();
      });
    });
    root.querySelectorAll('[data-toggle-topic]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const [trackId, topicId] = el.getAttribute('data-toggle-topic').split('|');
        const track = state.learning.tracks.find(t=>t.id===trackId);
        const topic = track.topics.find(t=>t.id===topicId);
        topic.done = !topic.done;
        await safeSet('learning-data', state.learning);
        render();
      });
    });
    root.querySelectorAll('[data-del-topic]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const [trackId, topicId] = el.getAttribute('data-del-topic').split('|');
        const track = state.learning.tracks.find(t=>t.id===trackId);
        track.topics = track.topics.filter(t=>t.id!==topicId);
        await safeSet('learning-data', state.learning);
        render();
      });
    });
    root.querySelectorAll('[data-toggle-topic-notes]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const topicId = el.getAttribute('data-toggle-topic-notes');
        state.openTopicNotes[topicId] = !state.openTopicNotes[topicId];
        render();
      });
    });
    root.querySelectorAll('[data-save-topic-details]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const [trackId, topicId] = el.getAttribute('data-save-topic-details').split('|');
        const track = state.learning.tracks.find(t=>t.id===trackId);
        const topic = track.topics.find(t=>t.id===topicId);
        const textarea = root.querySelector(`[data-topic-details="${trackId}|${topicId}"]`);
        topic.details = textarea.value;
        await safeSet('learning-data', state.learning);
        render();
      });
    });
    root.querySelectorAll('[data-toggle-notes]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const id = el.getAttribute('data-toggle-notes');
        state.openNotes[id] = !state.openNotes[id];
        render();
      });
    });
    root.querySelectorAll('[data-save-notes]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const trackId = el.getAttribute('data-save-notes');
        const textarea = root.querySelector(`[data-notes-track="${trackId}"]`);
        const track = state.learning.tracks.find(t=>t.id===trackId);
        track.notes = textarea.value;
        await safeSet('learning-data', state.learning);
        render();
      });
    });

    // Finance
    root.querySelectorAll('[data-finview]').forEach(el=>{
      el.addEventListener('click', ()=>{ state.financeView = el.getAttribute('data-finview'); render(); });
    });
    const finPrev = root.querySelector('#fin-prev');
    if(finPrev){
      finPrev.addEventListener('click', ()=>{
        if(state.financeView==='year' || state.financeView==='trend'){ state.finVizYear--; }
        else { state.finVizMonth--; if(state.finVizMonth<0){ state.finVizMonth=11; state.finVizYear--; } }
        render();
      });
    }
    const finNext = root.querySelector('#fin-next');
    if(finNext){
      finNext.addEventListener('click', ()=>{
        if(state.financeView==='year' || state.financeView==='trend'){ state.finVizYear++; }
        else { state.finVizMonth++; if(state.finVizMonth>11){ state.finVizMonth=0; state.finVizYear++; } }
        render();
      });
    }
    const finToday = root.querySelector('#fin-today');
    if(finToday){
      finToday.addEventListener('click', ()=>{
        const now = new Date();
        state.finVizYear = now.getFullYear();
        state.finVizMonth = now.getMonth();
        render();
      });
    }
    const addTxBtn = root.querySelector('#add-tx-btn');
    if(addTxBtn){
      addTxBtn.addEventListener('click', async ()=>{
        const typeSel = root.querySelector('#new-tx-type');
        const amountInput = root.querySelector('#new-tx-amount');
        const categoryInput = root.querySelector('#new-tx-category');
        const dateInput = root.querySelector('#new-tx-date');
        const noteInput = root.querySelector('#new-tx-note');
        const amount = parseFloat(amountInput.value);
        const category = categoryInput.value.trim();
        if(!amount || amount<=0 || !category) return;
        state.finance.transactions.push({
          id: uid(), type: typeSel.value, amount,
          category, date: dateInput.value || todayStr(),
          note: noteInput.value.trim()
        });
        await safeSet('finance-data', state.finance);
        render();
      });
    }
    root.querySelectorAll('[data-del-tx]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const id = el.getAttribute('data-del-tx');
        state.finance.transactions = state.finance.transactions.filter(t=>t.id!==id);
        await safeSet('finance-data', state.finance);
        render();
      });
    });
    const addBudgetBtn = root.querySelector('#add-budget-btn');
    if(addBudgetBtn){
      addBudgetBtn.addEventListener('click', async ()=>{
        const categoryInput = root.querySelector('#new-budget-category');
        const limitInput = root.querySelector('#new-budget-limit');
        const category = categoryInput.value.trim();
        const limit = parseFloat(limitInput.value);
        if(!category || !limit || limit <= 0) return;
        const existing = state.finance.budgets.find(b=>b.category.toLowerCase()===category.toLowerCase());
        if(existing){
          existing.limit = limit;
        } else {
          state.finance.budgets.push({ id: uid(), category, limit });
        }
        await safeSet('finance-data', state.finance);
        render();
      });

    root.querySelectorAll('[data-del-budget]').forEach(el=>{
      el.addEventListener('click', async ()=>{

        await safeSet('finance-data', state.finance);
        render();

    // Health
    const healthDatePicker = root.querySelector('#health-date-picker');

      healthDatePicker.addEventListener('change', ()=>{

        render();
      });
    }
    const saveHealthBtn = root.querySelector('#save-health-btn');
    if(saveHealthBtn){
      saveHealthBtn.addEventListener('click', async ()=>{
        const sleepHoursInput = root.querySelector('#health-sleep-hours');
        const sleepQualitySelect = root.querySelector('#health-sleep-quality');
        const restingHRInput = root.querySelector('#health-resting-hr');
        const current = getHealthEntry(state.healthDate);
        state.health.entries[state.healthDate] = {
          ...current,
          sleepHours: sleepHoursInput.value ? parseFloat(sleepHoursInput.value) : null,
          sleepQuality: sleepQualitySelect.value,
          restingHR: restingHRInput.value ? parseInt(restingHRInput.value,10) : null,
        };
        await safeSet('health-data', state.health);
        render();
      });
    }
    const addWorkoutBtn = root.querySelector('#add-workout-btn');
    if(addWorkoutBtn){
      addWorkoutBtn.addEventListener('click', async ()=>{
        const typeInput = root.querySelector('#new-workout-type');
        const durationInput = root.querySelector('#new-workout-duration');
        const type = typeInput.value.trim();
        const duration = parseInt(durationInput.value, 10);

        await safeSet('health-data', state.health);
        render();
      });

    root.querySelectorAll('[data-del-workout]').forEach(el=>{
      el.addEventListener('click', async ()=>{

      });

    root.querySelectorAll('[data-open-health]').forEach(el=>{

    // Journal

    if(datePicker){

        render();
      });

    const saveJournalBtn = root.querySelector('#save-journal-btn');
    if(saveJournalBtn){
      saveJournalBtn.addEventListener('click', async ()=>{

  function renderAuthScreen(){
    root.innerHTML = `
      <div class="lo-auth-wrap">
        <div class="lo-auth-card">
          <div class="lo-logo" style="margin-bottom:2px;">LIFE<span>OS</span></div>
          <div class="lo-tagline" style="margin-bottom:20px;">v1.0 // personīgā sistēma</div>
          <div class="lo-auth-tabs">
            <div class="lo-tab ${state.authMode==='login'?'active':''}" data-authmode="login">Pieslēgties</div>
            <div class="lo-tab ${state.authMode==='signup'?'active':''}" data-authmode="signup">Reģistrēties</div>
          </div>
          <input class="lo-input" type="email" id="auth-email" placeholder="E-pasts" style="margin-bottom:10px;" />
          <input class="lo-input" type="password" id="auth-password" placeholder="Parole" style="margin-bottom:14px;" />
          ${state.authError ? `<div class="lo-auth-error">${escapeHtml(state.authError)}</div>` : ''}
          <button class="lo-btn" id="auth-submit-btn" style="width:100%;" ${state.authBusy?'disabled':''}>${state.authBusy ? 'Lūdzu uzgaidi...' : (state.authMode==='login' ? 'Pieslēgties' : 'Izveidot kontu')}</button>
        </div>
      </div>
    `;
    attachAuthEvents();
  }

  function attachAuthEvents(){
    root.querySelectorAll('[data-authmode]').forEach(el=>{
      el.addEventListener('click', ()=>{
        state.authMode = el.getAttribute('data-authmode');
        state.authError = '';
        renderAuthScreen();
      });
    });
    const submitBtn = root.querySelector('#auth-submit-btn');
    const emailInput = root.querySelector('#auth-email');
    const pwInput = root.querySelector('#auth-password');
    async function doSubmit(){
      const email = emailInput.value.trim();
      const password = pwInput.value;
      if(!email || !password){ state.authError = 'Ievadi e-pastu un paroli.'; renderAuthScreen(); return; }
      state.authBusy = true; state.authError = '';
      renderAuthScreen();
      let result;
      if(state.authMode==='login'){
        result = await sb.auth.signInWithPassword({ email, password });
      } else {
        result = await sb.auth.signUp({ email, password });
      }
      state.authBusy = false;
      if(result.error){
        state.authError = result.error.message;
        renderAuthScreen();
        return;
      }
      if(state.authMode==='signup' && !result.data.session){
        state.authMode = 'login';
        state.authError = 'Konts izveidots! Pārbaudi e-pastu apstiprinājumam, tad pieslēdzies.';
        renderAuthScreen();
        return;
      }
      state.session = result.data.session;
      await loadAll();
    }
    if(submitBtn) submitBtn.addEventListener('click', doSubmit);
    if(pwInput) pwInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') doSubmit(); });
  }

  function renderRecoveryScreen(){
    root.innerHTML = `
      <div class="lo-auth-wrap">
        <div class="lo-auth-card">
          <div class="lo-logo" style="margin-bottom:2px;">LIFE<span>OS</span></div>
          <div class="lo-tagline" style="margin-bottom:20px;">Iestati jaunu paroli</div>
          <input class="lo-input" type="password" id="recovery-password" placeholder="Jaunā parole" style="margin-bottom:10px;" />
          <input class="lo-input" type="password" id="recovery-password-confirm" placeholder="Apstiprini paroli" style="margin-bottom:14px;" />
          ${state.authError ? `<div class="lo-auth-error">${escapeHtml(state.authError)}</div>` : ''}
          <button class="lo-btn" id="recovery-submit-btn" style="width:100%;" ${state.authBusy?'disabled':''}>${state.authBusy ? 'Lūdzu uzgaidi...' : 'Saglabāt jauno paroli'}</button>
        </div>
      </div>
    `;
    const submitBtn = root.querySelector('#recovery-submit-btn');
    submitBtn.addEventListener('click', async ()=>{
      const pw1 = root.querySelector('#recovery-password').value;
      const pw2 = root.querySelector('#recovery-password-confirm').value;
      if(!pw1 || pw1.length < 6){ state.authError = 'Parolei jābūt vismaz 6 rakstzīmes garai.'; renderRecoveryScreen(); return; }
      if(pw1 !== pw2){ state.authError = 'Paroles nesakrīt.'; renderRecoveryScreen(); return; }
      state.authBusy = true; state.authError = '';
      renderRecoveryScreen();
      const { error } = await sb.auth.updateUser({ password: pw1 });
      state.authBusy = false;
      if(error){
        state.authError = error.message;
        renderRecoveryScreen();
        return;
      }
      state.authError = '';
      state.isRecoveryLink = false;
      history.replaceState(null, '', window.location.pathname);
      await loadAll();
    });
  }

  async function initAuth(){
    state.isRecoveryLink = window.location.hash.includes('type=recovery');
    const { data } = await sb.auth.getSession();
    state.session = data.session;
    if(state.session && state.isRecoveryLink){
      renderRecoveryScreen();
    } else if(state.session){
      await loadAll();
    } else {
      renderAuthScreen();
    }
    sb.auth.onAuthStateChange((event, session)=>{
      state.session = session;
      if(event === 'PASSWORD_RECOVERY' || (session && state.isRecoveryLink && !state.loaded)){
        renderRecoveryScreen();
      } else if(session && !state.loaded){
        loadAll();
      } else if(!session){
        state.loaded = false;
        renderAuthScreen();
      }
    });
  }
  initAuth();
})();
</script>
