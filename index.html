<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Life OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap');

:root {
  --bg-void:#0A0D12;
  --bg-panel:#12161D;
  --bg-raised:#1A1F28;
  --accent:#4FD1C5;
  --accent-dim: rgba(79,209,197,0.14);
  --warn:#E8A33D;
  --warn-dim: rgba(232,163,61,0.14);
  --danger:#E8615C;
  --text:#E8ECF1;
  --text-muted:#7B8494;
  --text-dim:#4B5563;
  --border:#212733;
  --radius: 10px;
}

.lifeos-root {
  font-family: 'Inter', sans-serif;
  background: var(--bg-void);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.lifeos-root * { box-sizing: border-box; }

.lo-body { display: flex; flex: 1; min-height: 0; }

/* ---- Banner ---- */
.lo-banner { position: relative; width: 100%; height: 150px; flex-shrink: 0; background: var(--bg-panel); border-bottom: 1px solid var(--border); overflow: hidden; }
.lo-banner img { width: 100%; height: 100%; object-fit: cover; display: block; }
.lo-banner-empty {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px;
  cursor: pointer;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.5px;
  border: 1px dashed var(--border);
  box-sizing: border-box;
  transition: color .15s, border-color .15s;
}
.lo-banner-empty:hover { color: var(--accent); border-color: var(--accent); }
.lo-banner-controls { position: absolute; top: 10px; right: 10px; display: flex; gap: 6px; }
.lo-banner-position-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(10,13,18,0.85);
  backdrop-filter: blur(4px);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.lo-banner-position-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); white-space: nowrap; }
.lo-banner-position-overlay input[type=range] { flex: 1; accent-color: var(--accent); }
.lo-banner-btn {
  background: rgba(10,13,18,0.75);
  backdrop-filter: blur(4px);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
}
.lo-banner-btn:hover { border-color: var(--accent); color: var(--accent); }
.lo-banner-editor {
  position: absolute; inset: 0;
  background: rgba(10,13,18,0.94);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  padding: 14px;
}
.lo-banner-editor-label { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-muted); letter-spacing: 0.5px; }
.lo-banner-editor-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
.lo-banner-editor-row .lo-input { width: 240px; }

.lifeos-mono { font-family: 'JetBrains Mono', monospace; }

/* ---- Sidebar ---- */
.lo-sidebar {
  width: 210px;
  flex-shrink: 0;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 20px 14px;
  overflow: hidden;
  transition: width .2s ease, padding .2s ease;
}
.lo-sidebar.collapsed {
  width: 0;
  padding: 20px 0;
  border-right: none;
}
.lo-sidebar-toggle {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: 6px;
  width: 30px; height: 30px;
  font-size: 14px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.lo-sidebar-toggle:hover { color: var(--accent); border-color: var(--accent); }
.lo-logo {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 0.5px;
  color: var(--text);
  margin-bottom: 2px;
  padding: 0 6px;
}
.lo-logo span { color: var(--accent); }
.lo-tagline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  padding: 0 6px;
  margin-bottom: 22px;
  letter-spacing: 0.5px;
}
.lo-nav { display: flex; flex-direction: column; gap: 3px; }
.lo-nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
  transition: background .15s, color .15s;
  user-select: none;
  border: 1px solid transparent;
}
.lo-nav-item:hover { background: var(--bg-raised); color: var(--text); }
.lo-nav-item.active {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: rgba(79,209,197,0.25);
}
.lo-nav-item svg { flex-shrink: 0; opacity: 0.9; }
.lo-nav-spacer { flex: 1; }
.lo-status-mini {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  padding: 10px 6px 2px;
  border-top: 1px solid var(--border);
  margin-top: 10px;
  line-height: 1.6;
}
.lo-status-mini .dot { color: var(--accent); }

/* ---- YouTube Player ---- */
.lo-player { margin: 14px 0; padding-top: 14px; border-top: 1px solid var(--border); }
.lo-player-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.lo-player-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.5px; }
.lo-player-change { background: none; border: none; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 10px; cursor: pointer; padding: 0; }
.lo-player-change:hover { color: var(--accent); }
.lo-player-frame-wrap { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; background: var(--bg-raised); border: 1px solid var(--border); }
.lo-player-frame-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
.lo-player input.lo-input { font-size: 11px; padding: 7px 8px; margin-bottom: 6px; }
.lo-player button.lo-btn { width: 100%; font-size: 11px; padding: 7px; }

/* ---- Custom Time Picker ---- */
.lo-time-picker-wrap { display: contents; }
.lo-time-picker-btn {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 7px;
  padding: 9px 12px;
  font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  flex: 0 0 100px;
  text-align: center;
}
.lo-time-picker-btn:hover { border-color: var(--accent); color: var(--accent); }
.lo-time-picker-panel {
  position: absolute;
  z-index: 9999;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.5);
  padding: 10px;
  width: 180px;
}
.lo-time-picker-manual {
  width: 100%;
  margin-bottom: 8px;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1px;
}
.lo-time-picker-cols { display: flex; align-items: stretch; gap: 4px; height: 200px; }
.lo-time-picker-col {
  flex: 1;
  overflow-y: auto;
  scroll-snap-type: y proximity;
  border-radius: 6px;
  background: var(--bg-raised);
}
.lo-time-picker-col::-webkit-scrollbar { width: 5px; }
.lo-time-picker-col::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.lo-time-picker-sep { display: flex; align-items: center; justify-content: center; color: var(--text); font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 16px; }
.lo-time-picker-item {
  padding: 10px 0;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 600;
  color: #FFFFFF;
  cursor: pointer;
  scroll-snap-align: center;
  border-radius: 5px;
}
.lo-time-picker-item:hover { background: var(--bg-panel); color: var(--accent); }
.lo-time-picker-item.selected { background: var(--accent); color: #06231F; font-weight: 800; }
.lo-time-picker-actions { display: flex; gap: 6px; margin-top: 10px; }
.lo-time-picker-actions .lo-btn { flex: 1; font-size: 11px; padding: 7px; }

/* ---- Global Search ---- */
.lo-search-overlay {
  position: fixed; inset: 0; z-index: 10000;
  background: rgba(6,8,11,0.7);
  backdrop-filter: blur(2px);
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 12vh;
}
.lo-search-modal {
  width: 560px; max-width: 92vw;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  overflow: hidden;
}
.lo-search-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-size: 16px;
  padding: 16px 18px;
  outline: none;
  font-family: 'Inter', sans-serif;
  box-sizing: border-box;
}
.lo-search-results { max-height: 50vh; overflow-y: auto; padding: 8px; }
.lo-search-result {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
}
.lo-search-result:hover { background: var(--bg-raised); }
.lo-search-type { font-size: 15px; flex-shrink: 0; }
.lo-search-label { font-size: 13.5px; color: var(--text); }
.lo-search-sub { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
.lo-search-empty { padding: 24px; text-align: center; color: var(--text-dim); font-size: 13px; }
.lo-search-hint { padding: 10px 18px; border-top: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }

/* ---- Quick Add FAB ---- */
.lo-quick-add-fab {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--accent);
  color: #06231F;
  border: none;
  font-size: 26px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(79,209,197,0.35);
  z-index: 500;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.lo-quick-add-fab:hover { transform: scale(1.06); }
.lo-quickadd-panel {
  position: fixed;
  bottom: 88px; right: 24px;
  width: 300px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.55);
  padding: 12px;
  z-index: 501;
}
.lo-quickadd-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
.lo-quickadd-tab {
  flex: 1;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  padding: 6px 4px;
  border-radius: 6px;
  color: var(--text-muted);
  cursor: pointer;
  border: 1px solid var(--border);
}
.lo-quickadd-tab.active { background: var(--accent-dim); color: var(--accent); border-color: rgba(79,209,197,0.3); }
.lo-quickadd-habit-list { max-height: 200px; overflow-y: auto; }
.lo-quickadd-habit-item {
  padding: 9px 10px;
  border-radius: 7px;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  margin-bottom: 6px;
  font-size: 12.5px;
  cursor: pointer;
}
.lo-quickadd-habit-item:hover { border-color: var(--accent); color: var(--accent); }

/* ---- Drag & Drop ---- */
.lo-drag-handle { cursor: grab; color: var(--text-dim); font-size: 13px; flex-shrink: 0; padding: 0 2px; user-select: none; }
.lo-drag-handle:active { cursor: grabbing; }
[draggable="true"].lo-drag-over { border-top: 2px solid var(--accent); }

/* ---- Auth ---- */
.lo-auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
.lo-auth-card { width: 300px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; padding: 28px 24px; text-align: center; }
.lo-auth-tabs { display: flex; gap: 6px; margin-bottom: 18px; justify-content: center; }
.lo-auth-error { color: var(--danger); font-size: 11.5px; margin-bottom: 10px; font-family: 'JetBrains Mono', monospace; line-height: 1.5; }
.lo-logout-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  margin-top: 4px;
}
.lo-logout-btn:hover { color: var(--danger); }

/* ---- Main ---- */
.lo-main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg-void); }
.lo-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 26px;
  border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
}
.lo-topbar-left { font-size: 12px; color: var(--text-muted); letter-spacing: 0.5px; }
.lo-topbar-right { display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--text-dim); }
.lo-uptime-badge {
  background: var(--accent-dim);
  color: var(--accent);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.lo-content { flex: 1; overflow-y: auto; padding: 26px 30px 40px; }
.lo-content::-webkit-scrollbar { width: 8px; }
.lo-content::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 4px; }

.lo-module-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 4px;
}
.lo-module-sub {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 24px;
}

/* ---- Cards / grid ---- */
.lo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 24px; }
.lo-card {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
}
.lo-card-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.lo-card-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 26px;
  font-weight: 700;
}
.lo-card-value.accent { color: var(--accent); }
.lo-card-value.warn { color: var(--warn); }

.lo-panel {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 18px;
}
.lo-panel-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ---- Process list (habits on dashboard) ---- */
.lo-proc-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.lo-proc-row:last-child { border-bottom: none; }
.lo-proc-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
.lo-proc-dot.on { background: var(--accent); box-shadow: 0 0 8px rgba(79,209,197,0.6); }
.lo-proc-name { flex: 1; color: var(--text); }
.lo-proc-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }

/* ---- Forms ---- */
.lo-input, .lo-select, .lo-textarea {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 7px;
  padding: 9px 12px;
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  outline: none;
  width: 100%;
}
.lo-input:focus, .lo-select:focus, .lo-textarea:focus { border-color: var(--accent); }
.lo-textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
.lo-row-form { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.lo-daterange-field { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 220px; }
.lo-daterange-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--text-dim);
  flex-shrink: 0;
  width: 30px;
}
.lo-icon-quickpick { display: flex; flex-wrap: wrap; gap: 4px; max-height: 76px; overflow-y: auto; padding-right: 2px; }
.lo-icon-quickpick::-webkit-scrollbar { width: 5px; }
.lo-icon-quickpick::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.lo-icon-quickpick-btn {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: 6px;
  width: 30px; height: 30px;
  font-size: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.lo-icon-quickpick-btn:hover { border-color: var(--accent); }
.lo-color-swatches { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.lo-color-swatch {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  padding: 0;
}
.lo-color-swatch.selected { border-color: var(--text); box-shadow: 0 0 0 2px var(--bg-panel), 0 0 0 3px var(--text); }
.lo-color-swatch-none {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 11px;
  display: flex; align-items: center; justify-content: center;
}
.lo-row-form .lo-input { flex: 2; min-width: 140px; }
.lo-row-form .lo-select { flex: 1; min-width: 110px; }

.lo-btn {
  background: var(--accent);
  color: #06231F;
  border: none;
  padding: 9px 16px;
  border-radius: 7px;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: opacity .15s;
  white-space: nowrap;
}
.lo-btn:hover { opacity: 0.85; }
.lo-btn.ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
}
.lo-btn.ghost:hover { color: var(--text); border-color: var(--text-dim); }
.lo-btn.danger-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 10px;
  font-size: 11px;
}
.lo-btn.danger-ghost:hover { color: var(--danger); border-color: var(--danger); }

/* ---- Habits list ---- */

.lo-habit-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.lo-habit-item:last-child { border-bottom: none; }
.lo-habit-name { flex: 1; min-width: 0; }
.lo-habit-title { font-weight: 600; font-size: 13.5px; }
.lo-habit-area { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); margin-top: 2px; }
.lo-week { display: flex; gap: 5px; }
.lo-day-box {
  width: 26px; height: 26px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-raised);
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all .1s;
  flex-shrink: 0;
}
.lo-day-box.done { background: var(--accent); color: #06231F; border-color: var(--accent); font-weight: 700; }
.lo-day-box.not-scheduled { opacity: 0.32; }
.lo-day-box.not-scheduled.done { opacity: 0.6; }
.lo-day-box:hover { border-color: var(--accent); }
.lo-weekday-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 7px 11px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
  user-select: none;
}
.lo-weekday-chip:has(input:checked) { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.lo-weekday-chip input { accent-color: var(--accent); cursor: pointer; }
.lo-streak-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--warn);
  background: var(--warn-dim);
  padding: 3px 8px;
  border-radius: 5px;
  white-space: nowrap;
}

/* ---- Tasks ---- */
.lo-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
.lo-tab {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 6px 12px;
  border-radius: 6px;
  color: var(--text-muted);
  cursor: pointer;

  function habitsConsistencyData(days){
    const labels = [];
    const percentages = [];
    const today = new Date();
    for(let i = days - 1; i >= 0; i--){
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const ds = fmtDate(d);
      const scheduled = state.habits.habits.filter(h=>isHabitScheduled(h, ds));
      const done = scheduled.filter(h=> state.habits.logs[ds] && state.habits.logs[ds][h.id]);
      const pct = scheduled.length ? Math.round((done.length / scheduled.length) * 100) : 0;
      labels.push(ds.slice(5));
      percentages.push(pct);
    }
    return { labels, percentages };
  }

  function extractYouTubeSource(input){
    input = (input||'').trim();
    if(/^[a-zA-Z0-9_-]{11}$/.test(input)) return { type: 'video', id: input };
    try{
      const url = new URL(input);
      const list = url.searchParams.get('list');
      if(url.hostname.includes('youtu.be')){
        const id = url.pathname.slice(1).split('?')[0];
        if(list) return { type: 'playlist', id: list };
        if(id) return { type: 'video', id };
      }
      if(url.hostname.includes('youtube.com')){
        if(url.pathname === '/playlist' && list) return { type: 'playlist', id: list };
        if(url.pathname.startsWith('/embed/')) return { type: 'video', id: url.pathname.split('/embed/')[1] };
        if(url.pathname.startsWith('/shorts/')) return { type: 'video', id: url.pathname.split('/shorts/')[1] };
        const v = url.searchParams.get('v');
        if(v) return { type: 'video', id: v };
        if(list) return { type: 'playlist', id: list };
      }
    }catch(e){ /* not a valid URL */ }
    return null;
  }

  async function safeGet(key, fallback){
    if(!state.session) return fallback;
    try{
      const { data, error } = await sb.from('life_os_data').select('value').eq('user_id', state.session.user.id).eq('key', key).maybeSingle();
      if(error || !data) return fallback;
      return data.value;
    }catch(e){ return fallback; }
  }
  async function safeSet(key, value){
    if(!state.session) return;
    try{
      const { data: existing } = await sb.from('life_os_data').select('id').eq('user_id', state.session.user.id).eq('key', key).maybeSingle();
      if(existing){
        await sb.from('life_os_data').update({ value, updated_at: new Date().toISOString() }).eq('id', existing.id);
      } else {
        await sb.from('life_os_data').insert({ user_id: state.session.user.id, key, value });
      }
    }catch(e){ console.error('supabase set failed', key, e); }
  }

  function formatTaskDateRange(t){
    if(!t.dueDate) return '';
    let str = t.dueDate + (t.dueTime ? ' ' + t.dueTime : '');
    if(t.endDate && t.endDate !== t.dueDate){
      str += ' вЖТ ' + t.endDate + (t.endTime ? ' ' + t.endTime : '');
    } else if(t.endTime){
      str += 'вАУ' + t.endTime;
    }
    return str;
  }

  function taskOccursOnDate(t, dateStr){
    if(!t.dueDate) return false;
    if(t.endDate){
      return dateStr >= t.dueDate && dateStr <= t.endDate;
    }
    return dateStr === t.dueDate;
  }

  function isHabitScheduled(h, dateStr){
    if(h.startDate && dateStr < h.startDate) return false;
    const rec = h.recurrence || 'daily';
    if(rec === 'daily') return true;
    if(rec === 'weekly'){
      const dow = new Date(dateStr+'T00:00:00').getDay();
      return (h.weekdays||[]).includes(dow);
    }
    if(rec === 'monthly'){
      const dayNum = parseInt(dateStr.slice(8,10),10);
      return dayNum === (h.monthDay || 1);
    }
    return true;
  }

  function recurrenceLabel(h){
    const rec = h.recurrence || 'daily';
    if(rec === 'daily') return 'katru dienu';
    if(rec === 'weekly'){
      const names = (h.weekdays||[]).slice().sort().map(i=>DAY_LABELS[i]);
      return names.length ? 'katru nedƒУƒЉu (' + names.join(', ') + ')' : 'katru nedƒУƒЉu';
    }
    if(rec === 'monthly') return 'katru mƒУnesi, ' + (h.monthDay || 1) + '. dienƒБ';
    return '';
  }

  function currentStreak(habitId){
    const habit = state.habits.habits.find(h=>h.id===habitId);
    if(!habit) return 0;
    let streak = 0;
    let d = new Date();
    let guard = 0;
    while(guard < 3660){
      guard++;
      const ds = fmtDate(d);
      if(habit.startDate && ds < habit.startDate) break;
      if(isHabitScheduled(habit, ds)){
        if(state.habits.logs[ds] && state.habits.logs[ds][habitId]){
          streak++;
          d.setDate(d.getDate()-1);
        } else break;
      } else {
        d.setDate(d.getDate()-1);
      }
    }
    return streak;
  }

    return cells;
  }

  // ---------------- TASKS ----------------
  function renderTasks(){
    let list = state.tasks.tasks.map((t, idx)=>({ ...t, _origIndex: idx }));
    if(state.taskFilter==='active') list = list.filter(t=>!t.done);
    if(state.taskFilter==='done') list = list.filter(t=>t.done);

    const projects = Array.from(new Set(state.tasks.tasks.map(t=>t.project).filter(Boolean))).sort();
    if(state.taskProjectFilter !== 'all') list = list.filter(t=>t.project === state.taskProjectFilter);

    const canDrag = state.taskSort === 'manual' && state.taskFilter === 'all' && state.taskProjectFilter === 'all';

    if(state.taskSort === 'priority'){
      const order = { 'Augsta': 0, 'VidƒУja': 1, 'Zema': 2 };
      list = [...list].sort((a,b)=> order[a.priority] - order[b.priority]);
    } else if(state.taskSort === 'due'){
      list = [...list].sort((a,b)=>{
        if(!a.dueDate && !b.dueDate) return 0;
        if(!a.dueDate) return 1;
        if(!b.dueDate) return -1;
        const aKey = a.dueDate + ' ' + (a.dueTime || '00:00');
        const bKey = b.dueDate + ' ' + (b.dueTime || '00:00');
        return aKey.localeCompare(bKey);
      });

  // ---------------- FINANCE ----------------
  function monthTotals(year, month){
    const key = `${year}-${String(month+1).padStart(2,'0')}`;
    let income = 0, expense = 0; const byCategory = {};
    state.finance.transactions.forEach(t=>{
      if(t.date.slice(0,7)===key){
        if(t.type==='income') income += t.amount;
        else { expense += t.amount; byCategory[t.category] = (byCategory[t.category]||0) + t.amount; }
      }
    });
    return { income, expense, byCategory };
  }
  function yearTotals(year){
    const income = new Array(12).fill(0), expense = new Array(12).fill(0);
    state.finance.transactions.forEach(t=>{
      const [y,m] = t.date.split('-');
      if(parseInt(y,10)===year){
        const idx = parseInt(m,10)-1;
        if(t.type==='income') income[idx] += t.amount; else expense[idx] += t.amount;
      }
    });
    return { income, expense };
  }
  function monthDailyTotals(year, month){
    const days = new Date(year, month+1, 0).getDate();
    const income = new Array(days).fill(0), expense = new Array(days).fill(0);
    state.finance.transactions.forEach(t=>{
      const d = new Date(t.date+'T00:00:00');
      if(d.getFullYear()===year && d.getMonth()===month){
        const idx = d.getDate()-1;
        if(t.type==='income') income[idx] += t.amount; else expense[idx] += t.amount;
      }
    });
    return { income, expense, days };
  }
  function palette(n){
    const colors = ['#4FD1C5','#E8A33D','#E8615C','#7C9EF5','#C77DFF','#5EEAD4','#F4A261','#94A3B8'];
    const out = []; for(let i=0;i<n;i++) out.push(colors[i%colors.length]); return out;
  }

      maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { color: '#B8C0CC', font: { family: 'Inter', size: 11 } } } },

        y: { ticks: { color: '#7B8494', font: { size: 10 } }, grid: { color: '#212733' }, beginAtZero: true }
      }
    };
  }

  function mountFinanceChart(){
    const canvas = root.querySelector('#finance-chart');
    if(!canvas || !window.Chart) return;
    if(financeChartInstance){ financeChartInstance.destroy(); financeChartInstance = null; }
    const ctx = canvas.getContext('2d');
    let config;
    if(state.financeView==='summary'){
      const { income, expense, byCategory } = monthTotals(state.finVizYear, state.finVizMonth);
      const labels = Object.keys(byCategory);
      if(labels.length===0){
        config = { type:'bar', data:{ labels:['≈†is mƒУnesis'], datasets:[
          { label:'IenƒБkumi', data:[income], backgroundColor:'#4FD1C5' },
          { label:'Izdevumi', data:[expense], backgroundColor:'#E8615C' }
        ]}, options: baseBarOptions() };
      } else {
        config = { type:'doughnut', data:{ labels, datasets:[{ data: Object.values(byCategory), backgroundColor: palette(labels.length), borderWidth: 0 }] },
          options: { responsive:true, maintainAspectRatio:false, cutout:'62%', plugins:{ legend:{ position:'bottom', labels:{ color:'#B8C0CC', font:{family:'Inter', size:11} } } } } };
      }
    } else if(state.financeView==='month'){
      const { income, expense, days } = monthDailyTotals(state.finVizYear, state.finVizMonth);
      const labels = Array.from({length: days}, (_,i)=>String(i+1));
      config = { type:'bar', data:{ labels, datasets:[
        { label:'IenƒБkumi', data: income, backgroundColor:'#4FD1C5' },
        { label:'Izdevumi', data: expense, backgroundColor:'#E8615C' }
      ]}, options: baseBarOptions() };
    } else if(state.financeView==='year'){
      const { income, expense } = yearTotals(state.finVizYear);
      const labels = ['Jan','Feb','Mar','Apr','Mai','J≈Ђn','J≈Ђl','Aug','Sep','Okt','Nov','Dec'];
      config = { type:'bar', data:{ labels, datasets:[
        { label:'IenƒБkumi', data: income, backgroundColor:'#4FD1C5' },
        { label:'Izdevumi', data: expense, backgroundColor:'#E8615C' }
      ]}, options: baseBarOptions() };
    } else {
      const { income, expense } = yearTotals(state.finVizYear);
      const balanceSeries = income.map((v,i)=> v - expense[i]);
      const labels = ['Jan','Feb','Mar','Apr','Mai','J≈Ђn','J≈Ђl','Aug','Sep','Okt','Nov','Dec'];
      config = { type:'line', data:{ labels, datasets:[
        { label:'IenƒБkumi', data: income, borderColor:'#4FD1C5', backgroundColor:'rgba(79,209,197,0.1)', tension:0.35, pointRadius:3, fill:true },
        { label:'Izdevumi', data: expense, borderColor:'#E8615C', backgroundColor:'rgba(232,97,92,0.1)', tension:0.35, pointRadius:3, fill:true },
        { label:'Bilance', data: balanceSeries, borderColor:'#7C9EF5', borderDash:[5,4], tension:0.35, pointRadius:3, fill:false }
      ]}, options: baseBarOptions() };
    }
    financeChartInstance = new Chart(ctx, config);
  }

  function renderBudgetSection(){

    const budgets = state.finance.budgets;

    return `

        </div>

        ${budgets.length ? (()=>{
          const totalBudgeted = budgets.reduce((s,b)=>s+b.limit,0);
          const totalSpent = budgets.reduce((s,b)=>s+(byCategory[b.category]||0),0);
          const remaining = totalBudgeted - totalSpent;
          return `

  function buildSearchIndex(){
    const items = [];
    state.tasks.tasks.forEach(t=>{
      items.push({ type: 'task', label: t.text, sub: t.project || t.priority, action: ()=>{ state.module = 'tasks'; render(); } });
    });
    state.habits.habits.forEach(h=>{
      items.push({ type: 'habit', label: h.name, sub: h.area, action: ()=>{ state.module = 'habits'; render(); } });
    });
    state.goals.goals.forEach(g=>{
      items.push({ type: 'goal', label: g.text, sub: g.area, action: ()=>{ state.module = 'goals'; render(); } });
    });
    state.learning.tracks.forEach(tr=>{
      items.push({ type: 'learning', label: tr.name, sub: 'Prasme', action: ()=>{ state.module = 'learning'; render(); } });
      tr.topics.forEach(top=>{
        items.push({ type: 'learning', label: top.text, sub: tr.name, action: ()=>{ state.module = 'learning'; render(); } });
      });
    });
    Object.entries(state.journal.entries).forEach(([d, text])=>{
      if(!text) return;
      items.push({ type: 'journal', label: text.slice(0, 70), sub: d, action: ()=>{ state.journalDate = d; state.module = 'journal'; render(); } });
    });
    return items;
  }

  function openSearch(){
    closeSearch();
    closeTimePicker();
    closeQuickAdd();
    const overlay = document.createElement('div');
    overlay.className = 'lo-search-overlay';
    overlay.id = 'lo-active-search';
    overlay.innerHTML = `
      <div class="lo-search-modal">
        <input type="text" class="lo-search-input" id="lo-search-input" placeholder="MeklƒУt uzdevumus, ieradumus, mƒУrƒЈus, dienasgrƒБmatu, mƒБcƒЂbas..." />
        <div class="lo-search-results" id="lo-search-results"></div>
        <div class="lo-search-hint">ESC lai aizvƒУrtu ¬Ј Cmd/Ctrl+K lai atvƒУrtu jebkurƒБ brƒЂdƒЂ</div>
      </div>
    `;
    document.body.appendChild(overlay);
    const input = overlay.querySelector('#lo-search-input');
    const resultsEl = overlay.querySelector('#lo-search-results');
    input.focus();

    let currentFiltered = [];
    function renderResults(query){
      const items = buildSearchIndex();
      const q = query.trim().toLowerCase();
      currentFiltered = q
        ? items.filter(it=> it.label.toLowerCase().includes(q) || (it.sub||'').toLowerCase().includes(q))
        : items.slice(0, 12);
      currentFiltered = currentFiltered.slice(0, 25);
      resultsEl.innerHTML = currentFiltered.length ? currentFiltered.map((it,i)=>`
        <div class="lo-search-result" data-search-idx="${i}">
          <span class="lo-search-type">${searchTypeIcon(it.type)}</span>
          <div>
            <div class="lo-search-label">${escapeHtml(it.label)}</div>
            ${it.sub ? `<div class="lo-search-sub">${escapeHtml(it.sub)}</div>` : ''}
          </div>
        </div>
      `).join('') : `<div class="lo-search-empty">Nekas nav atrasts.</div>`;
      resultsEl.querySelectorAll('[data-search-idx]').forEach(el=>{
        el.addEventListener('click', ()=>{
          const idx = parseInt(el.getAttribute('data-search-idx'), 10);
          currentFiltered[idx].action();
          closeSearch();
        });
      });
    }
    renderResults('');
    input.addEventListener('input', ()=> renderResults(input.value));
    input.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeSearch(); });
    overlay.addEventListener('mousedown', (e)=>{ if(e.target === overlay) closeSearch(); });
  }

  function closeQuickAdd(){

  function openQuickAdd(triggerEl){
    closeQuickAdd();
    closeTimePicker();
    closeSearch();
    const panel = document.createElement('div');
    panel.className = 'lo-quickadd-panel';
    panel.id = 'lo-active-quickadd';
    panel.innerHTML = `
      <div class="lo-quickadd-tabs">
        <div class="lo-quickadd-tab active" data-qa-type="task">Uzdevums</div>
        <div class="lo-quickadd-tab" data-qa-type="journal">PiezƒЂme</div>
        <div class="lo-quickadd-tab" data-qa-type="habit">Ieradums</div>
      </div>
      <input type="text" class="lo-input" id="lo-quickadd-input" placeholder="Uzraksti uzdevumu..." />
      <div class="lo-quickadd-habit-list" id="lo-quickadd-habit-list" style="display:none;"></div>
      <button class="lo-btn" id="lo-quickadd-submit" style="width:100%;margin-top:8px;">Pievienot</button>
    `;
    document.body.appendChild(panel);

    let currentType = 'task';
    const input = panel.querySelector('#lo-quickadd-input');
    const habitList = panel.querySelector('#lo-quickadd-habit-list');
    const submitBtn = panel.querySelector('#lo-quickadd-submit');
    input.focus();

    function refreshHabitList(){
      const today = todayStr();
      const pending = state.habits.habits.filter(h=> isHabitScheduled(h, today) && !(state.habits.logs[today] && state.habits.logs[today][h.id]));
      habitList.innerHTML = pending.length
        ? pending.map(h=>`<div class="lo-quickadd-habit-item" data-qa-habit="${h.id}">${escapeHtml(h.name)}</div>`).join('')
        : `<div class="lo-empty" style="padding:8px 0;">Visi ≈°odienas ieradumi jau izpildƒЂti! рЯОЙ</div>`;
      habitList.querySelectorAll('[data-qa-habit]').forEach(el=>{
        el.addEventListener('click', async ()=>{
          const id = el.getAttribute('data-qa-habit');
          const today2 = todayStr();
          if(!state.habits.logs[today2]) state.habits.logs[today2] = {};
          state.habits.logs[today2][id] = true;
          await safeSet('habits-data', state.habits);
          closeQuickAdd();
          render();
        });
      });
    }

    panel.querySelectorAll('[data-qa-type]').forEach(tab=>{
      tab.addEventListener('click', ()=>{
        currentType = tab.getAttribute('data-qa-type');
        panel.querySelectorAll('[data-qa-type]').forEach(t=>t.classList.remove('active'));
        tab.classList.add('active');
        const placeholders = { task: 'Uzraksti uzdevumu...', journal: 'ƒАtra doma ≈°odienai...' };
        if(currentType === 'habit'){
          input.style.display = 'none';
          submitBtn.style.display = 'none';
          habitList.style.display = 'block';
          refreshHabitList();
        } else {
          input.style.display = 'block';
          submitBtn.style.display = 'block';
          habitList.style.display = 'none';
          input.placeholder = placeholders[currentType];
          input.focus();
        }
      });
    });

    async function submit(){
      const val = input.value.trim();
      if(!val) return;
      if(currentType === 'task'){
        state.tasks.tasks.unshift({ id: uid(), text: val, project: '', dueDate: null, dueTime: null, priority: 'VidƒУja', done: false });
        await safeSet('tasks-data', state.tasks);
      } else if(currentType === 'journal'){
        const today = todayStr();
        const existing = state.journal.entries[today] || '';
        state.journal.entries[today] = existing ? existing + '\n' + val : val;
        await safeSet('journal-data', state.journal);
      }
      closeQuickAdd();
      render();
    }
    submitBtn.addEventListener('click', submit);
    input.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){ submit(); }
      if(e.key === 'Escape'){ closeQuickAdd(); }
    });

    const outsideHandler = (e)=>{
      if(!panel.contains(e.target) && e.target !== triggerEl){
        closeQuickAdd();
        document.removeEventListener('mousedown', outsideHandler);
      }
    };
    setTimeout(()=>{ document.addEventListener('mousedown', outsideHandler); }, 0);
  }

  function openTimePicker(triggerEl, currentValue, onSelect){
    closeTimePicker();
    const rect = triggerEl.getBoundingClientRect();
    const panel = document.createElement('div');
    panel.className = 'lo-time-picker-panel';
    panel.id = 'lo-active-time-picker';

    let [ch, cm] = (currentValue || '').split(':').map(v=>parseInt(v,10));
    if(isNaN(ch)) ch = new Date().getHours();
    if(isNaN(cm)) cm = 0;

    const hoursCol = Array.from({length:24}, (_,i)=>i);
    const minutesCol = Array.from({length:60}, (_,i)=>i);

    panel.innerHTML = `
      <input type="text" class="lo-input lo-time-picker-manual" id="lo-tp-manual" placeholder="HH:MM" value="${String(ch).padStart(2,'0')}:${String(cm).padStart(2,'0')}" inputmode="numeric" />
      <div class="lo-time-picker-cols">
        <div class="lo-time-picker-col" id="lo-tp-hours">
          ${hoursCol.map(h=>`<div class="lo-time-picker-item ${h===ch?'selected':''}" data-h="${h}">${String(h).padStart(2,'0')}</div>`).join('')}
        </div>
        <div class="lo-time-picker-sep">:</div>
        <div class="lo-time-picker-col" id="lo-tp-minutes">
          ${minutesCol.map(m=>`<div class="lo-time-picker-item ${m===cm?'selected':''}" data-m="${m}">${String(m).padStart(2,'0')}</div>`).join('')}
        </div>
      </div>
      <div class="lo-time-picker-actions">
        <button type="button" class="lo-btn ghost" id="lo-tp-clear">NotƒЂrƒЂt</button>
        <button type="button" class="lo-btn" id="lo-tp-done">Gatavs</button>
      </div>
    `;
    document.body.appendChild(panel);

    let top = rect.bottom + window.scrollY + 6;
    let left = rect.left + window.scrollX;
    const panelWidth = panel.offsetWidth;
    if(left + panelWidth > window.innerWidth - 10) left = Math.max(10, window.innerWidth - panelWidth - 10);
    if(top + panel.offsetHeight > window.innerHeight + window.scrollY - 10){
      top = rect.top + window.scrollY - panel.offsetHeight - 6;
    }
    panel.style.top = top + 'px';
    panel.style.left = left + 'px';

    let selH = ch, selM = cm;
    const manualInput = panel.querySelector('#lo-tp-manual');

    function highlightWheel(){
      panel.querySelectorAll('#lo-tp-hours .lo-time-picker-item').forEach(x=>{
        x.classList.toggle('selected', parseInt(x.getAttribute('data-h'),10)===selH);
      });
      panel.querySelectorAll('#lo-tp-minutes .lo-time-picker-item').forEach(x=>{
        x.classList.toggle('selected', parseInt(x.getAttribute('data-m'),10)===selM);
      });
      const hEl = panel.querySelector(`#lo-tp-hours .lo-time-picker-item[data-h="${selH}"]`);
      if(hEl) hEl.scrollIntoView({ block: 'center' });
      const mEl = panel.querySelector(`#lo-tp-minutes .lo-time-picker-item[data-m="${selM}"]`);
      if(mEl) mEl.scrollIntoView({ block: 'center' });
    }

    function syncManualToWheel(){
      const val = manualInput.value.trim();
      const m = val.match(/^([0-9]{1,2}):([0-9]{1,2})$/);
      if(!m) return false;
      const hh = parseInt(m[1],10), mm = parseInt(m[2],10);
      if(hh<0 || hh>23 || mm<0 || mm>59) return false;
      selH = hh; selM = mm;
      highlightWheel();
      return true;
    }

    manualInput.addEventListener('input', ()=>{
      manualInput.value = manualInput.value.replace(/[^0-9:]/g, '');
    });
    manualInput.addEventListener('keydown', (e)=>{

        const track = state.learning.tracks.find(t=>t.id===trackId);
        track.topics.push({ id: uid(), text, done: false });
        await safeSet('learning-data', state.learning);
        render();
      });
    });
    root.querySelectorAll('[data-toggle-topic]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const [trackId, topicId] = el.getAttribute('data-toggle-topic').split('|');
        const track = state.learning.tracks.find(t=>t.id===trackId);
        const topic = track.topics.find(t=>t.id===topicId);
        topic.done = !topic.done;
        await safeSet('learning-data', state.learning);
        render();
      });
    });
    root.querySelectorAll('[data-del-topic]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const [trackId, topicId] = el.getAttribute('data-del-topic').split('|');
        const track = state.learning.tracks.find(t=>t.id===trackId);
        track.topics = track.topics.filter(t=>t.id!==topicId);
        await safeSet('learning-data', state.learning);
        render();
      });
    });
    root.querySelectorAll('[data-toggle-topic-notes]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const topicId = el.getAttribute('data-toggle-topic-notes');
        state.openTopicNotes[topicId] = !state.openTopicNotes[topicId];
        render();
      });
    });
    root.querySelectorAll('[data-save-topic-details]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const [trackId, topicId] = el.getAttribute('data-save-topic-details').split('|');
        const track = state.learning.tracks.find(t=>t.id===trackId);
        const topic = track.topics.find(t=>t.id===topicId);
        const textarea = root.querySelector(`[data-topic-details="${trackId}|${topicId}"]`);
        topic.details = textarea.value;
        await safeSet('learning-data', state.learning);
        render();
      });
    });
    root.querySelectorAll('[data-toggle-notes]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const id = el.getAttribute('data-toggle-notes');
        state.openNotes[id] = !state.openNotes[id];
        render();
      });
    });
    root.querySelectorAll('[data-save-notes]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const trackId = el.getAttribute('data-save-notes');
        const textarea = root.querySelector(`[data-notes-track="${trackId}"]`);
        const track = state.learning.tracks.find(t=>t.id===trackId);
        track.notes = textarea.value;
        await safeSet('learning-data', state.learning);
        render();
      });
    });

    // Finance
    root.querySelectorAll('[data-finview]').forEach(el=>{
      el.addEventListener('click', ()=>{ state.financeView = el.getAttribute('data-finview'); render(); });
    });
    const finPrev = root.querySelector('#fin-prev');
    if(finPrev){
      finPrev.addEventListener('click', ()=>{
        if(state.financeView==='year' || state.financeView==='trend'){ state.finVizYear--; }
        else { state.finVizMonth--; if(state.finVizMonth<0){ state.finVizMonth=11; state.finVizYear--; } }
        render();
      });
    }
    const finNext = root.querySelector('#fin-next');
    if(finNext){
      finNext.addEventListener('click', ()=>{
        if(state.financeView==='year' || state.financeView==='trend'){ state.finVizYear++; }
        else { state.finVizMonth++; if(state.finVizMonth>11){ state.finVizMonth=0; state.finVizYear++; } }
        render();
      });
    }
    const finToday = root.querySelector('#fin-today');
    if(finToday){
      finToday.addEventListener('click', ()=>{
        const now = new Date();
        state.finVizYear = now.getFullYear();
        state.finVizMonth = now.getMonth();
        render();
      });
    }
    const addTxBtn = root.querySelector('#add-tx-btn');
    if(addTxBtn){
      addTxBtn.addEventListener('click', async ()=>{
        const typeSel = root.querySelector('#new-tx-type');
        const amountInput = root.querySelector('#new-tx-amount');
        const categoryInput = root.querySelector('#new-tx-category');
        const dateInput = root.querySelector('#new-tx-date');
        const noteInput = root.querySelector('#new-tx-note');
        const amount = parseFloat(amountInput.value);
        const category = categoryInput.value.trim();
        if(!amount || amount<=0 || !category) return;
        state.finance.transactions.push({
          id: uid(), type: typeSel.value, amount,
          category, date: dateInput.value || todayStr(),
          note: noteInput.value.trim()
        });
        await safeSet('finance-data', state.finance);
        render();
      });
    }
    root.querySelectorAll('[data-del-tx]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const id = el.getAttribute('data-del-tx');
        state.finance.transactions = state.finance.transactions.filter(t=>t.id!==id);
        await safeSet('finance-data', state.finance);
        render();
      });
    });
    const addBudgetBtn = root.querySelector('#add-budget-btn');
    if(addBudgetBtn){
      addBudgetBtn.addEventListener('click', async ()=>{
        const categoryInput = root.querySelector('#new-budget-category');
        const limitInput = root.querySelector('#new-budget-limit');
        const category = categoryInput.value.trim();
        const limit = parseFloat(limitInput.value);
        if(!category || !limit || limit <= 0) return;
        const existing = state.finance.budgets.find(b=>b.category.toLowerCase()===category.toLowerCase());
        if(existing){
          existing.limit = limit;
        } else {
          state.finance.budgets.push({ id: uid(), category, limit });
        }
        await safeSet('finance-data', state.finance);
        render();
      });
    }
    root.querySelectorAll('[data-del-budget]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const id = el.getAttribute('data-del-budget');
        state.finance.budgets = state.finance.budgets.filter(b=>b.id!==id);
        await safeSet('finance-data', state.finance);
        render();
      });
    });
    if(state.module==='dashboard' || state.module==='finance'){
      loadChartJs(()=>{ mountFinanceChart(); });
    }
    if(state.module==='habits'){
      loadChartJs(()=>{ mountHabitsChart(); });
    }

    // Health
    const healthDatePicker = root.querySelector('#health-date-picker');
    if(healthDatePicker){
      healthDatePicker.addEventListener('change', ()=>{
        state.healthDate = healthDatePicker.value;
        render();
      });
    }
    const saveHealthBtn = root.querySelector('#save-health-btn');
    if(saveHealthBtn){
      saveHealthBtn.addEventListener('click', async ()=>{
        const sleepHoursInput = root.querySelector('#health-sleep-hours');
        const sleepQualitySelect = root.querySelector('#health-sleep-quality');
        const restingHRInput = root.querySelector('#health-resting-hr');
        const current = getHealthEntry(state.healthDate);
        state.health.entries[state.healthDate] = {
          ...current,
          sleepHours: sleepHoursInput.value ? parseFloat(sleepHoursInput.value) : null,
          sleepQuality: sleepQualitySelect.value,
          restingHR: restingHRInput.value ? parseInt(restingHRInput.value,10) : null,
        };
        await safeSet('health-data', state.health);
        render();
      });
    }
    const addWorkoutBtn = root.querySelector('#add-workout-btn');
    if(addWorkoutBtn){
      addWorkoutBtn.addEventListener('click', async ()=>{
        const typeInput = root.querySelector('#new-workout-type');
        const durationInput = root.querySelector('#new-workout-duration');
        const type = typeInput.value.trim();
        const duration = parseInt(durationInput.value, 10);
        if(!type || !duration) return;
        const current = getHealthEntry(state.healthDate);
        current.workouts.push({ id: uid(), type, duration });
        state.health.entries[state.healthDate] = current;
        await safeSet('health-data', state.health);
        render();
      });
    }
    root.querySelectorAll('[data-del-workout]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const id = el.getAttribute('data-del-workout');
        const current = getHealthEntry(state.healthDate);
        current.workouts = current.workouts.filter(w=>w.id!==id);
        state.health.entries[state.healthDate] = current;
        await safeSet('health-data', state.health);
        render();
      });
    });
    root.querySelectorAll('[data-open-health]').forEach(el=>{
      el.addEventListener('click', ()=>{
        state.healthDate = el.getAttribute('data-open-health');
        render();
      });
    });

    // Journal
    const datePicker = root.querySelector('#journal-date-picker');
    if(datePicker){
      datePicker.addEventListener('change', ()=>{
        state.journalDate = datePicker.value;
        render();
      });
    }
    const saveJournalBtn = root.querySelector('#save-journal-btn');
    if(saveJournalBtn){
      saveJournalBtn.addEventListener('click', async ()=>{
        const textarea = root.querySelector('#journal-textarea');
        state.journal.entries[state.journalDate] = textarea.value;
        await safeSet('journal-data', state.journal);
        render();
      });
    }
    root.querySelectorAll('[data-open-journal]').forEach(el=>{
      el.addEventListener('click', ()=>{
        state.journalDate = el.getAttribute('data-open-journal');
        render();
      });
    });
  }

  function renderAuthScreen(){
    root.innerHTML = `
      <div class="lo-auth-wrap">
        <div class="lo-auth-card">
          <div class="lo-logo" style="margin-bottom:2px;">LIFE<span>OS</span></div>
          <div class="lo-tagline" style="margin-bottom:20px;">v1.0 // personƒЂgƒБ sistƒУma</div>
          <div class="lo-auth-tabs">
            <div class="lo-tab ${state.authMode==='login'?'active':''}" data-authmode="login">PieslƒУgties</div>
            <div class="lo-tab ${state.authMode==='signup'?'active':''}" data-authmode="signup">Reƒ£istrƒУties</div>
          </div>
          <input class="lo-input" type="email" id="auth-email" placeholder="E-pasts" style="margin-bottom:10px;" />
          <input class="lo-input" type="password" id="auth-password" placeholder="Parole" style="margin-bottom:14px;" />
          ${state.authError ? `<div class="lo-auth-error">${escapeHtml(state.authError)}</div>` : ''}
          <button class="lo-btn" id="auth-submit-btn" style="width:100%;" ${state.authBusy?'disabled':''}>${state.authBusy ? 'L≈Ђdzu uzgaidi...' : (state.authMode==='login' ? 'PieslƒУgties' : 'Izveidot kontu')}</button>
        </div>
      </div>
    `;
    attachAuthEvents();
  }

  function attachAuthEvents(){
    root.querySelectorAll('[data-authmode]').forEach(el=>{
      el.addEventListener('click', ()=>{
        state.authMode = el.getAttribute('data-authmode');
        state.authError = '';
        renderAuthScreen();
      });
    });
    const submitBtn = root.querySelector('#auth-submit-btn');
    const emailInput = root.querySelector('#auth-email');
    const pwInput = root.querySelector('#auth-password');
    async function doSubmit(){
      const email = emailInput.value.trim();
      const password = pwInput.value;
      if(!email || !password){ state.authError = 'Ievadi e-pastu un paroli.'; renderAuthScreen(); return; }
      state.authBusy = true; state.authError = '';
      renderAuthScreen();
      let result;
      if(state.authMode==='login'){
        result = await sb.auth.signInWithPassword({ email, password });
      } else {
        result = await sb.auth.signUp({ email, password });
      }
      state.authBusy = false;
      if(result.error){
        state.authError = result.error.message;
        renderAuthScreen();
        return;
      }
      if(state.authMode==='signup' && !result.data.session){
        state.authMode = 'login';
        state.authError = 'Konts izveidots! PƒБrbaudi e-pastu apstiprinƒБjumam, tad pieslƒУdzies.';
        renderAuthScreen();
        return;
      }
      state.session = result.data.session;
      await loadAll();
    }
    if(submitBtn) submitBtn.addEventListener('click', doSubmit);
    if(pwInput) pwInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') doSubmit(); });
  }

  function renderRecoveryScreen(){
    root.innerHTML = `
      <div class="lo-auth-wrap">
        <div class="lo-auth-card">
          <div class="lo-logo" style="margin-bottom:2px;">LIFE<span>OS</span></div>
          <div class="lo-tagline" style="margin-bottom:20px;">Iestati jaunu paroli</div>
          <input class="lo-input" type="password" id="recovery-password" placeholder="JaunƒБ parole" style="margin-bottom:10px;" />
          <input class="lo-input" type="password" id="recovery-password-confirm" placeholder="Apstiprini paroli" style="margin-bottom:14px;" />
          ${state.authError ? `<div class="lo-auth-error">${escapeHtml(state.authError)}</div>` : ''}
          <button class="lo-btn" id="recovery-submit-btn" style="width:100%;" ${state.authBusy?'disabled':''}>${state.authBusy ? 'L≈Ђdzu uzgaidi...' : 'SaglabƒБt jauno paroli'}</button>
        </div>
      </div>
    `;
    const submitBtn = root.querySelector('#recovery-submit-btn');
    submitBtn.addEventListener('click', async ()=>{
      const pw1 = root.querySelector('#recovery-password').value;
      const pw2 = root.querySelector('#recovery-password-confirm').value;
      if(!pw1 || pw1.length < 6){ state.authError = 'Parolei jƒБb≈Ђt vismaz 6 rakstzƒЂmes garai.'; renderRecoveryScreen(); return; }
      if(pw1 !== pw2){ state.authError = 'Paroles nesakrƒЂt.'; renderRecoveryScreen(); return; }
      state.authBusy = true; state.authError = '';
      renderRecoveryScreen();
      const { error } = await sb.auth.updateUser({ password: pw1 });
      state.authBusy = false;
      if(error){
        state.authError = error.message;
        renderRecoveryScreen();
        return;
      }
      state.authError = '';
      state.isRecoveryLink = false;
      history.replaceState(null, '', window.location.pathname);
      await loadAll();
    });
  }

  async function initAuth(){
    state.isRecoveryLink = window.location.hash.includes('type=recovery');
    const { data } = await sb.auth.getSession();
    state.session = data.session;
    if(state.session && state.isRecoveryLink){
      renderRecoveryScreen();
    } else if(state.session){
      await loadAll();
    } else {
      renderAuthScreen();
    }
    sb.auth.onAuthStateChange((event, session)=>{
      state.session = session;
      if(event === 'PASSWORD_RECOVERY' || (session && state.isRecoveryLink && !state.loaded)){
        renderRecoveryScreen();
      } else if(session && !state.loaded){
        loadAll();
      } else if(!session){
        state.loaded = false;
        renderAuthScreen();
      }
    });
  }
  document.addEventListener('keydown', (e)=>{
    if((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k'){
      e.preventDefault();
      if(state.loaded) openSearch();
    }
  });

  initAuth();
})();
</script>
</body>
</html>
